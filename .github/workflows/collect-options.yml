name: Options Data Collector

on:
  schedule:
    # 매일 21:10 UTC (EST 17:10, 장 마감 40분 후)
    - cron: '10 21 * * 1-5'
  workflow_dispatch:
    # 수동 실행 가능 (GitHub Actions 탭에서 Run workflow 버튼)

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests pandas

      - name: Run collector
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
          CF_DB_ID:      ${{ secrets.CF_DB_ID }}
          ADMIN_SECRET:  ${{ secrets.ADMIN_SECRET }}
          API_BASE:      https://api.drbalance.xyz
        run: python scripts/collect_options.py
