name = "gexcf"
main = "src/index.js"
compatibility_date = "2024-09-23"

[[kv_namespaces]]
binding = "CACHE"
id = "59baf409d2d64e4cb9f0a6a2d50cd8a2"

# D1 데이터베이스 - Options Screener
[[d1_databases]]
binding = "DB"
database_name = "options-screener"
database_id = "placeholder"  # wrangler d1 create 후 실제 ID로 교체 필요

[triggers]
# UTC 기준: 13:30~21:00 월-금 (EST 09:30~17:00) 5분마다
crons = ["*/5 13-20 * * 1-5", "0 21 * * 1-5"]
