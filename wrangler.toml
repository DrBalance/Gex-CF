name = "gexcf"
main = "src/index.js"
compatibility_date = "2024-09-23"

[[kv_namespaces]]
binding = "CACHE"
id = "59baf409d2d64e4cb9f0a6a2d50cd8a2"

# D1 데이터베이스 - Options Screener
[[d1_databases]]
binding = "DB"
database_name = "options-screener"
database_id = "35b4574c-3e3e-4d85-b12d-7cf857414db7"

[triggers]
# UTC 기준
# 프리마켓 + 정규장 + 애프터: UTC 08:00~01:00 (EST 04:00~20:00)
crons = [
  "*/5 8-23 * * 1-5",
  "*/5 0-1 * * 2-6",
  "0 21 * * 1-5"
]
