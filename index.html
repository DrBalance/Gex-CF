<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>딜러 리스크 대시보드 v5</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --blue:#58a6ff;--blue-dim:#1f6feb;--green:#3fb950;--red:#f85149;
  --yellow:#d29922;--orange:#f0883e;--purple:#bc8cff;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'SF Mono','Fira Code','Consolas',monospace;
}
html,body{width:100%;min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px}

/* ── 헤더 ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 28px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:14px}
.logo{font-size:18px;font-weight:700;letter-spacing:-.3px}
.logo span{color:var(--orange)}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0}
.status-dot.live{background:var(--green);box-shadow:0 0 7px var(--green)}
.status-dot.updating{background:var(--yellow);animation:pulse 1s infinite}
.status-text{font-size:13px;color:var(--text2)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── 컨트롤 바 ── */
.ctrl-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:10px 28px;border-bottom:1px solid var(--border);background:var(--bg2)}
select,button{font-family:var(--font);font-size:14px}
.sym-select,.exp-select{background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:7px 12px;cursor:pointer}
.exp-select{min-width:180px}
.load-btn{background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue-dim);border-radius:6px;padding:7px 22px;cursor:pointer;font-weight:600;transition:all .15s}
.load-btn:hover:not(:disabled){background:var(--blue);color:#000}
.load-btn:disabled{opacity:.4;cursor:not-allowed}
.auto-btn{background:var(--bg3);color:var(--text3);border:1px solid var(--border);border-radius:6px;padding:7px 14px;cursor:pointer;font-size:13px;transition:all .2s;display:flex;align-items:center;gap:6px}
.auto-btn.on{border-color:rgba(63,185,80,.5);color:var(--green);background:rgba(63,185,80,.08)}
.auto-btn .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.auto-btn.on .dot{animation:pulse 1s infinite}
.ctrl-spacer{flex:1}
.data-time{font-size:12px;color:var(--text3);font-family:var(--mono)}

/* ── 메인 ── */
.main{width:100%;padding:20px 28px;display:flex;flex-direction:column;gap:20px}

/* ── 카드 ── */
.card{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:22px 28px}
.card-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:16px}

/* ── GEX 레짐 ── */
.regime-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:7px;margin-bottom:16px;font-size:15px;font-weight:600}
.regime-bar.positive{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.25);color:#7ee787}
.regime-bar.negative{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.25);color:#ffa198}

/* ── 알람 ── */
.alarm{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:7px;margin-bottom:7px;font-size:14px;font-weight:500}
.alarm::before{content:'';width:7px;height:7px;border-radius:50%;flex-shrink:0}
.alarm.red{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:#ffa198}
.alarm.red::before{background:var(--red);box-shadow:0 0 5px var(--red)}
.alarm.yellow{background:rgba(210,153,34,.1);border:1px solid rgba(210,153,34,.3);color:#e3b341}
.alarm.yellow::before{background:var(--yellow)}
.alarm.green{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.3);color:#7ee787}
.alarm.green::before{background:var(--green)}
.alarm.blue{background:rgba(88,166,255,.1);border:1px solid rgba(88,166,255,.3);color:#9ecbff}
.alarm.blue::before{background:var(--blue)}
.alarm.purple{background:rgba(188,140,255,.1);border:1px solid rgba(188,140,255,.3);color:#d2b4ff}
.alarm.purple::before{background:var(--purple)}

/* ── 메트릭 그리드 (8+2=10칸) ── */
.metrics{display:grid;grid-template-columns:repeat(10,1fr);gap:10px;margin-top:16px}
@media(max-width:1400px){.metrics{grid-template-columns:repeat(5,1fr)}}
@media(max-width:700px) {.metrics{grid-template-columns:repeat(2,1fr)}}
.metric{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px 12px;text-align:center}
.metric .val{font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px;font-family:var(--mono)}
.metric .lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.metric.red .val{color:var(--red)}.metric.green .val{color:var(--green)}
.metric.yellow .val{color:var(--yellow)}.metric.blue .val{color:var(--blue)}
.metric.orange .val{color:var(--orange)}.metric.purple .val{color:var(--purple)}
.metric.warn .val{color:var(--yellow)}.metric.danger .val{color:var(--red)}

/* ── 헷지 부담 ── */
.hedge-section{margin-top:20px}
.hedge-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.hedge-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:700px){.hedge-grid{grid-template-columns:1fr}}
.hedge-col-label{font-size:12px;color:var(--text3);margin-bottom:8px;font-weight:600}
.hedge-row{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);margin-bottom:6px;transition:background .15s}
.hedge-row:hover{background:#252b33}
.hedge-row.flashing{animation:hflash .7s ease}
@keyframes hflash{0%,100%{background:var(--bg3)}50%{background:rgba(240,136,62,.25)}}
.hedge-rank{font-size:11px;font-weight:700;width:18px;text-align:center;flex-shrink:0}
.hedge-rank.r1{color:var(--red)}.hedge-rank.r2{color:var(--orange)}.hedge-rank.r3{color:var(--yellow)}.hedge-rank.r4{color:var(--text2)}
.hedge-strike{font-size:15px;font-weight:700;font-family:var(--mono);color:var(--text);flex:1}
.hedge-dist{font-size:11px;color:var(--text2);width:44px;text-align:right;flex-shrink:0}
.hedge-bar-wrap{width:70px;height:5px;background:var(--bg);border-radius:3px;flex-shrink:0}
.hedge-bar{height:5px;border-radius:3px}
.hedge-bar.up{background:var(--green)}.hedge-bar.dn{background:var(--red)}
.hedge-pressure{font-size:11px;color:var(--text3);font-family:var(--mono);width:46px;text-align:right;flex-shrink:0}

/* ── 내러티브 ── */
.narrative{margin-top:18px;padding:16px 18px;border-radius:8px;border:1px solid rgba(188,140,255,.25);background:rgba(188,140,255,.05)}
.narrative-title{font-size:12px;font-weight:600;color:var(--purple);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em}
.narrative-body{font-size:13px;color:var(--text2);line-height:1.8}
.narrative-body b{color:var(--text);font-weight:600}
.scenario{margin-top:10px;padding:10px 14px;border-radius:6px;background:var(--bg3);border-left:3px solid var(--border);font-size:13px;color:var(--text2);line-height:1.7}
.scenario.bull{border-left-color:var(--green)}.scenario.bear{border-left-color:var(--red)}
.scenario b{color:var(--text)}

/* ── 실시간 상황 판단 패널 ── */
.live-judgment{margin-top:14px;padding:14px 16px;border-radius:8px;border:1px solid rgba(88,166,255,.2);background:rgba(88,166,255,.05);display:none}
.live-judgment.visible{display:block}
.lj-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.lj-dot{width:7px;height:7px;border-radius:50%;background:var(--blue);animation:pulse 1.5s infinite}
.lj-title{font-size:12px;font-weight:600;color:var(--blue);text-transform:uppercase;letter-spacing:.06em}
.lj-trend{font-size:15px;font-weight:700;padding:10px 14px;border-radius:6px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.lj-trend.bearish{background:rgba(248,81,73,.12);border:1px solid rgba(248,81,73,.3);color:#ffa198}
.lj-trend.bullish{background:rgba(63,185,80,.12);border:1px solid rgba(63,185,80,.3);color:#7ee787}
.lj-trend.neutral{background:rgba(139,148,158,.08);border:1px solid var(--border);color:var(--text2)}
.lj-trend.reversal-up{background:rgba(188,140,255,.12);border:1px solid rgba(188,140,255,.3);color:#d2b4ff}
.lj-trend.reversal-dn{background:rgba(240,136,62,.12);border:1px solid rgba(240,136,62,.3);color:#ffb380}
.lj-events{font-size:12px;color:var(--text3)}
.lj-event{padding:5px 0;border-bottom:1px solid rgba(48,54,61,.6);display:flex;gap:8px;line-height:1.5}
.lj-event:last-child{border-bottom:none}
.lj-event .ev-t{color:var(--text3);font-family:var(--mono);flex-shrink:0;min-width:60px}
.lj-event .ev-msg{color:var(--text2)}
.lj-event .up{color:var(--green)}.lj-event .dn{color:var(--red)}.lj-event .warn{color:var(--yellow)}

/* ── 언와인드 감지 패널 ── */
.unwind-panel{margin-top:14px;padding:14px 16px;border-radius:8px;border:1px solid rgba(210,153,34,.25);background:rgba(210,153,34,.05);display:none}
.unwind-panel.visible{display:block}
.unwind-title{font-size:12px;font-weight:600;color:var(--yellow);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.unwind-status{font-size:14px;color:var(--text2);line-height:1.7}
.unwind-status b{color:var(--text)}
.unwind-status .signal{color:var(--yellow);font-weight:700}
.unwind-status .strong{color:var(--orange);font-weight:700}

/* ── 프리마켓 반전 패널 ── */
.premarket-panel{margin-top:14px;padding:16px 18px;border-radius:8px;border:1px solid rgba(188,140,255,.3);background:rgba(188,140,255,.06)}
.premarket-panel.warning{border-color:rgba(248,81,73,.5);background:rgba(248,81,73,.07)}
.premarket-panel.caution{border-color:rgba(210,153,34,.4);background:rgba(210,153,34,.07)}
.pm-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.pm-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--purple)}
.premarket-panel.warning .pm-title{color:#ffa198}
.premarket-panel.caution .pm-title{color:#e3b341}
.pm-message{font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px}
.pm-detail{font-size:13px;color:var(--text2);line-height:1.7}
.pm-metrics{display:flex;gap:20px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);flex-wrap:wrap}
.pm-stat{font-size:12px;color:var(--text3)}
.pm-stat b{color:var(--text);font-family:var(--mono)}

/* ── 차트 ── */
.chart-controls{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.zoom-label{font-size:12px;color:var(--text3)}
.zoom-slider{-webkit-appearance:none;width:160px;height:4px;border-radius:2px;background:var(--bg3);outline:none;cursor:pointer}
.zoom-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--blue);cursor:pointer}
.zoom-val{font-size:12px;color:var(--blue);font-family:var(--mono);min-width:30px}
.scroll-hint{font-size:12px;color:var(--text3)}
.chart-scroll-wrap{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;border-radius:6px;border:1px solid var(--border)}
.chart-scroll-wrap::-webkit-scrollbar{height:5px}
.chart-scroll-wrap::-webkit-scrollbar-track{background:var(--bg3)}
.chart-scroll-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.chart-inner{position:relative;height:460px;min-width:100%}

/* ── 테이블 ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:13px;color:var(--text3);font-weight:500;text-align:right;padding:10px 14px;border-bottom:1px solid var(--border);white-space:nowrap}
th:first-child{text-align:left}
td{padding:8px 14px;text-align:right;font-size:13px;border-bottom:1px solid rgba(48,54,61,.5);color:var(--text2);font-family:var(--mono)}
td:first-child{text-align:left;font-family:var(--font);font-weight:600;color:var(--text)}
tr:hover td{background:rgba(255,255,255,.02)}
tr.cur td{background:rgba(88,166,255,.07)}.tr.cur td:first-child{color:var(--blue)}
tr.flip td{background:rgba(240,136,62,.06)}.tr.flip td:first-child{color:var(--orange)}
.tag{display:inline-block;font-size:10px;padding:2px 6px;border-radius:3px;margin-left:5px;font-weight:700}
.tag-cur{background:rgba(88,166,255,.2);color:var(--blue)}.tag-flip{background:rgba(240,136,62,.2);color:var(--orange)}
.tag-pw{background:rgba(248,81,73,.2);color:var(--red)}.tag-cw{background:rgba(63,185,80,.2);color:var(--green)}

/* ── 빈/로딩 ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:90px 24px;gap:16px;color:var(--text3)}
.empty-icon{font-size:44px;opacity:.35}.empty-title{font-size:17px;font-weight:500;color:var(--text2)}
.empty-sub{font-size:14px;text-align:center;line-height:1.7}
.spinner{width:38px;height:38px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">Dr.<span>Balance</span> GEX</div>
    <div class="status-dot" id="status-dot"></div>
    <div class="status-text" id="status-text">대기 중</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div style="font-size:12px;color:var(--text3);font-family:var(--mono)">api.drbalance.xyz</div>
    <div class="data-time" id="data-time"></div>
  </div>
</div>

<div class="ctrl-bar">
  <select class="sym-select" id="sym-select">
    <option value="SPY">SPY</option>
    <option value="QQQ">QQQ</option>
    <option value="_SPX">SPX</option>
    <option value="_NDX">NDX</option>
  </select>
  <select class="exp-select" id="exp-select"><option value="">로드 중...</option></select>
  <button class="load-btn" id="load-btn" onclick="loadData()">⬇ 데이터 로드</button>
  <button class="auto-btn" id="auto-btn" onclick="toggleAuto()">
    <div class="dot"></div><span id="auto-label">자동갱신 OFF</span>
  </button>
  <div class="ctrl-spacer"></div>
</div>

<div class="main" id="main-area">
  <div class="card">
    <div class="empty-state">
      <div class="empty-icon">◈</div>
      <div class="empty-title">심볼 선택 후 데이터 로드를 눌러주세요</div>
      <div class="empty-sub">CBOE 15분 지연 · CSV 불필요 · 버튼 한 번으로 옵션 체인 자동 로드<br>자동갱신: 현재가+VIX만 재조회 (~1KB/분) — 체인 재로드 없음</div>
    </div>
  </div>
</div>

<script>
const PROXY = 'https://api.drbalance.xyz';
let chartInst = null;
let allOptions = [], spotPrice = 0, vixVal = null, vvixVal = null;
let currentStrikes = [], currentD = null;
let autoInterval = null;
let liveEvents = [];   // 실시간 이벤트 로그
let priceHistory = []; // {time, price, vix} 히스토리 for 언와인드 감지
let prevSpot = null;
let zoomLevel = 1;
let activeTooltipIdx = null; // 차트 hover 인덱스

window.addEventListener('DOMContentLoaded', () => { loadExpirations(); loadVIX(); });
document.getElementById('sym-select').addEventListener('change', () => { allOptions=[]; loadExpirations(); });

// ── VIX 초기 로드 ──
async function loadVIX() {
  try {
    const json = await fetch(`${PROXY}/api/vix?symbols=VIX,VVIX`).then(r=>r.json());
    vixVal  = json.VIX?.price;
    vvixVal = json.VVIX?.price;
    updateVIXMetrics();
  } catch(e){}
}

function updateVIXMetrics() {
  // 메트릭 카드 업데이트 (render 후 호출)
  const vm = document.getElementById('metric-vix');
  const vvm = document.getElementById('metric-vvix');
  if (vm && vixVal) {
    vm.querySelector('.val').textContent = vixVal.toFixed(2);
    vm.className = 'metric' + (vixVal>30?' danger':vixVal>20?' warn':'');
  }
  if (vvm && vvixVal) {
    vvm.querySelector('.val').textContent = vvixVal.toFixed(2);
    vvm.className = 'metric' + (vvixVal>130?' danger':vvixVal>110?' warn':'');
  }
}

// ── 자동갱신 토글 ──
function toggleAuto() {
  if (autoInterval) {
    clearInterval(autoInterval);
    autoInterval = null;
    document.getElementById('auto-btn').className = 'auto-btn';
    document.getElementById('auto-label').textContent = '자동갱신 OFF';
  } else {
    if (!currentD) { alert('먼저 데이터를 로드해주세요'); return; }
    document.getElementById('auto-btn').className = 'auto-btn on';
    document.getElementById('auto-label').textContent = '자동갱신 ON';
    autoRefresh(); // 즉시 1회
    autoInterval = setInterval(autoRefresh, 60000);
  }
}

// ── 자동갱신: 현재가 + VIX만 (체인 재로드 없음 → ~1.5KB/요청) ──
async function autoRefresh() {
  if (!currentD) return;
  try {
    setStatus('updating');
    const sym = document.getElementById('sym-select').value.replace('_','');
    const [priceJson, vixJson] = await Promise.all([
      fetch(`${PROXY}/api/price?symbol=${sym==='SPX'?'SPY':sym}`).then(r=>r.json()),
      fetch(`${PROXY}/api/vix?symbols=VIX,VVIX`).then(r=>r.json()),
    ]);

    // 프리마켓 / 정규장 / 애프터마켓 자동 감지
    const newSpot       = priceJson.price;           // 현재 활성 가격
    const marketState   = priceJson.marketState;     // "PRE" | "REGULAR" | "POST" | "CLOSED"
    const priceLabel    = priceJson.priceLabel;      // "preMarket" | "regular" | "postMarket"
    const regularPrice  = priceJson.regularPrice;    // 정규장 종가
    const prevClose     = priceJson.prevClose;       // 전일 종가
    const preMarketPct  = priceJson.preMarketChangePercent; // 프리마켓 등락률

    vixVal  = vixJson.VIX?.price;
    vvixVal = vixJson.VVIX?.price;

    const now = new Date();
    const timeStr = now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});

    // 히스토리 기록 (최대 60개 = 60분), 상태 정보 포함
    priceHistory.push({ time:timeStr, price:newSpot, marketState, priceLabel, vix:vixVal, vvix:vvixVal, ts:now.getTime() });
    if (priceHistory.length > 60) priceHistory.shift();

    // 상황 판단 — 프리마켓 컨텍스트 전달
    const judgment = analyzeRealtime(newSpot, priceHistory, currentD, { marketState, priceLabel, preMarketPct, prevClose });
    const unwind   = detectUnwind(priceHistory, currentD);

    // UI 업데이트
    const stateLabel = { PRE:'프리마켓', REGULAR:'정규장', POST:'애프터', CLOSED:'마감' }[marketState] || marketState;
    document.getElementById('data-time').textContent = `${stateLabel} ${timeStr}`;
    updateVIXMetrics();
    updateSpotMetric(newSpot, marketState, priceLabel, preMarketPct, prevClose);
    renderJudgment(judgment, timeStr, newSpot);
    renderUnwind(unwind, timeStr);

    // 내러티브 실시간 갱신 (프리마켓/정규장 현재가 반영)
    const narrEl = document.getElementById('narrative-body');
    if (narrEl && currentD) {
      const liveCtx = { livePrice: newSpot, marketState, prevClose };
      const freshNarr = buildNarrative(currentD, liveCtx);
      if (freshNarr) narrEl.innerHTML = freshNarr.main;
    }

    // 프리마켓 반전 패널 실시간 업데이트 (PRE / REGULAR 개장 초 모두 유효)
    const pmPanel = document.getElementById('premarket-panel');
    if (pmPanel && currentD) {
      const liveVC = calculateVannaCharm(currentD.strikes, newSpot, currentD.exp);
      const liveRev = analyzePremarketReversal(currentD, liveVC, marketState, preMarketPct);
      pmPanel.className = `premarket-panel ${liveRev.level}`;
      const pmMsg = document.getElementById('pm-message');
      const pmDet = document.getElementById('pm-detail');
      const pmVanna = document.getElementById('pm-vanna');
      const pmCharm = document.getElementById('pm-charm');
      const pmSkew  = document.getElementById('pm-skew');
      const pmScore = document.getElementById('pm-score');
      if (pmMsg) pmMsg.textContent = liveRev.message;
      if (pmDet) pmDet.textContent = liveRev.detail;
      if (pmVanna) pmVanna.textContent = liveVC.totalVanna.toFixed(1)+'M';
      if (pmCharm) pmCharm.textContent = liveVC.totalCharm.toFixed(1)+'M';
      if (pmSkew)  pmSkew.textContent  = liveRev.putSkew.toFixed(2);
      if (pmScore) pmScore.textContent  = liveRev.score+'/6';
      // Vanna 메트릭 카드도 업데이트
      const mVanna = document.getElementById('metric-vanna');
      const mCharm = document.getElementById('metric-charm');
      if (mVanna) { mVanna.querySelector('.val').textContent = liveVC.totalVanna.toFixed(1)+'M'; mVanna.className='metric'+(liveVC.totalVanna>4?' red':liveVC.totalVanna<-4?' green':''); }
      if (mCharm) { mCharm.querySelector('.val').textContent = liveVC.totalCharm.toFixed(1)+'M'; mCharm.className='metric'+(Math.abs(liveVC.totalCharm)>2?' yellow':''); }
    }

    prevSpot = newSpot;
    setStatus('live');
  } catch(e) { console.error(e); setStatus('error'); }
}

// ── 실시간 상황 판단 로직 ──
function analyzeRealtime(newSpot, history, d, ctx) {
  ctx = ctx || {};
  const { hedgeTargets, upStrikes, dnStrikes, flipZone, totalGEX } = d;
  const marketState  = ctx.marketState  || 'REGULAR';
  const priceLabel   = ctx.priceLabel   || 'regular';
  const preMarketPct = ctx.preMarketPct || null;
  const prevClose    = ctx.prevClose    || null;
  // 기준가: 프리마켓이면 전일 종가, 정규장이면 CBOE 로드 시 종가
  const base = (marketState === 'PRE' && prevClose) ? prevClose : d.spotPrice;
  const pctChange = (newSpot - base) / base * 100;
  const vixUp = history.length >= 3 && history[history.length-1].vix > history[history.length-3].vix * 1.03;
  const vixDn = history.length >= 3 && history[history.length-1].vix < history[history.length-3].vix * 0.97;

  let trend = 'neutral', message = '', detail = '';
  const events = [];

  // 현재가가 어느 헷지 구간에 있는지 판단
  const breachedDn = dnStrikes.filter(s => newSpot <= s.strike).sort((a,b)=>b.strike-a.strike);
  const breachedUp = upStrikes.filter(s => newSpot >= s.strike).sort((a,b)=>a.strike-b.strike);

  if (pctChange <= -1.5) {
    trend = 'bearish';
    message = `⚠ 하락 심화 진행 중 (${pctChange.toFixed(2)}%)`;
    if (breachedDn.length >= 2) detail = `하락 방향 헷지 구간 ${breachedDn.length}개 이탈 — 딜러 추가 매도 헷지 가속`;
    else if (breachedDn.length === 1) detail = `$${breachedDn[0].strike} 헷지 구간 진입 — 딜러 매도 헷지 시작`;
    if (vixUp) { events.push({cls:'dn',msg:'VIX 상승 중 — Vanna 매도 압력 추가'}); }
  } else if (pctChange <= -0.5) {
    trend = 'bearish';
    message = `▼ 하락 추세 (${pctChange.toFixed(2)}%)`;
    if (breachedDn.length > 0) detail = `$${breachedDn[0].strike} 헷지 구간 근접 — 돌파 시 낙폭 가속`;
    if (vixDn) { events.push({cls:'warn',msg:'VIX 수축 신호 — 반등 가능성 체크'}); }
  } else if (pctChange >= 1.5) {
    trend = 'bullish';
    message = `▲ 상승 추세 (${pctChange.toFixed(2)}%)`;
    if (breachedUp.length > 0) detail = `$${breachedUp[0].strike} 콜 헷지 구간 진입 — 딜러 매수 헷지 동반`;
    if (vixDn) { events.push({cls:'up',msg:'VIX 수축 — Vanna 매수 압력 강화'}); }
  } else if (pctChange >= 0.5) {
    trend = 'bullish';
    message = `▲ 소폭 상승 (${pctChange.toFixed(2)}%)`;
  }

  // 반전 신호 감지
  if (history.length >= 5) {
    const recent5 = history.slice(-5).map(h=>h.price);
    const prev3Avg = (recent5[0]+recent5[1]+recent5[2])/3;
    const last2Avg = (recent5[3]+recent5[4])/2;
    const microChange = (last2Avg - prev3Avg) / prev3Avg * 100;

    if (trend === 'bearish' && microChange > 0.3) {
      trend = 'reversal-up';
      message = `↑ 반전 상승 의심 — 하락 추세에서 단기 반등 신호`;
      detail = `직전 5분 ${microChange.toFixed(2)}% 반등 감지`;
      events.push({cls:'warn',msg:'추세 전환 여부 확인 필요 — VIX 역전 여부 주목'});
    } else if (trend === 'bullish' && microChange < -0.3) {
      trend = 'reversal-dn';
      message = `↓ 반전 하락 의심 — 상승 추세에서 단기 꺾임 신호`;
      detail = `직전 5분 ${Math.abs(microChange).toFixed(2)}% 하락 감지`;
    }
  }

  if (!message) { trend='neutral'; message='→ 중립 (기준가 ±0.5% 이내)'; }

  // 프리마켓 컨텍스트 추가
  const priceContext = marketState === 'PRE'
    ? `프리마켓 (전일종가 $${prevClose?.toFixed(2)} 기준)`
    : marketState === 'POST' ? '애프터마켓' : '정규장';

  return { trend, message, detail, events, newSpot, pctChange, priceContext, marketState };
}

// ── 언와인드 감지 ──
function detectUnwind(history, d) {
  if (history.length < 5) return null;
  const { totalGEX, spotPrice: baseSpot } = d;

  // 최근 가격 흐름 분석
  const recent = history.slice(-10);
  const prices = recent.map(h=>h.price);
  const vixes  = recent.map(h=>h.vix).filter(Boolean);

  // 가격 변동성 감소 체크 (표준편차)
  const mean = prices.reduce((a,b)=>a+b,0)/prices.length;
  const variance = prices.reduce((a,b)=>a+(b-mean)**2,0)/prices.length;
  const stdDev = Math.sqrt(variance);
  const pctStd = stdDev / mean * 100;

  // VIX 하락 속도
  const vixSlope = vixes.length >= 4
    ? (vixes[vixes.length-1] - vixes[0]) / vixes[0] * 100
    : 0;

  // 현재가가 기준가로 회귀하고 있는지
  const currentPct = (prices[prices.length-1] - baseSpot) / baseSpot * 100;
  const prevPct = (prices[Math.floor(prices.length/2)] - baseSpot) / baseSpot * 100;
  const reversion = Math.abs(currentPct) < Math.abs(prevPct) - 0.2;

  // 언와인드 신호 판단
  let signal = null, detail = '';

  if (pctStd < 0.05 && Math.abs(currentPct) > 0.5 && reversion) {
    signal = 'strong';
    detail = `변동성 수축(±${(pctStd*100).toFixed(0)}bp) + 가격 회귀 중 — 딜러 헷지 언와인드 가능성`;
  } else if (vixSlope < -3 && reversion) {
    signal = 'moderate';
    detail = `VIX ${vixSlope.toFixed(1)}% 하락 + 현재가 회귀 — Vanna 언와인드 진행 의심`;
  } else if (reversion && vixSlope < -1) {
    signal = 'weak';
    detail = `가격 안정화 + VIX 소폭 하락 — 언와인드 초기 신호 관찰 중`;
  }

  const now = new Date();
  const estTime = new Date(now.toLocaleString('en-US',{timeZone:'America/New_York'}));
  const estHour = estTime.getHours() + estTime.getMinutes()/60;
  const marketClose = 16.0;
  const minsToClose = Math.max(0, Math.round((marketClose - estHour) * 60));

  return { signal, detail, minsToClose, stdDev: pctStd, vixSlope, reversion };
}

async function loadData() {
  const sym = document.getElementById('sym-select').value;
  const exp = document.getElementById('exp-select').value;
  if (!exp) return;
  const btn = document.getElementById('load-btn');
  btn.disabled=true; btn.textContent='⏳ 로딩 중...';
  setStatus('loading');
  document.getElementById('main-area').innerHTML=`<div class="card"><div class="empty-state"><div class="spinner"></div><div class="empty-sub">CBOE 데이터 수신 중...</div></div></div>`;

  try {
    if (!allOptions.length) {
      const json = await fetch(`${PROXY}/api/options?symbol=${sym}`).then(r=>r.json());
      spotPrice=json.data.current_price; allOptions=json.data.options;
      document.getElementById('data-time').textContent=`로드: ${json.timestamp}`;
    }

    const expKey = exp.replace(/-/g,'').slice(2);
    const parsed = allOptions.filter(o=>{
      const m=o.option.trim().match(/(\d{6})[CP]/); return m&&m[1]===expKey;
    }).map(o=>{
      const m=o.option.trim().match(/(\d{6})([CP])(\d+)/);
      return {strike:parseInt(m[3])/1000,type:m[2],iv:o.iv,gamma:o.gamma,delta:o.delta,oi:o.open_interest,volume:o.volume};
    });

    const map={};
    parsed.forEach(o=>{
      if(!map[o.strike])map[o.strike]={strike:o.strike,callOI:0,putOI:0,callGamma:0,putGamma:0,callVol:0,putVol:0,ivSum:0,ivN:0};
      const s=map[o.strike];
      if(o.type==='C'){s.callOI+=o.oi;s.callGamma=o.gamma;s.callVol+=o.volume;}
      else{s.putOI+=o.oi;s.putGamma=o.gamma;s.putVol+=o.volume;}
      if(o.iv>0){s.ivSum+=o.iv;s.ivN++;}
    });

    const strikes=Object.values(map).sort((a,b)=>a.strike-b.strike);
    strikes.forEach(s=>{
      const g=(s.callGamma+s.putGamma)/2;
      s.gex=(s.callOI-s.putOI)*100*g*spotPrice*spotPrice*0.01;
      s.iv=s.ivN>0?s.ivSum/s.ivN:0;
      s.callHedge=s.callGamma*s.callOI*100*spotPrice;
      s.putHedge=s.putGamma*s.putOI*100*spotPrice;
    });

    let cum=0,flipZone=null;
    strikes.forEach(s=>{const p=cum;cum+=s.gex;s.cumGex=cum;if(!flipZone&&((p<0&&cum>=0)||(p>0&&cum<=0)))flipZone=s.strike;});

    const near=strikes.filter(s=>Math.abs(s.strike-spotPrice)/spotPrice<0.10);
    const putWall=near.reduce((b,s)=>s.putOI>b.putOI?s:b,near[0])?.strike;
    const callWall=near.reduce((b,s)=>s.callOI>b.callOI?s:b,near[0])?.strike;
    const localGEX=strikes.filter(s=>Math.abs(s.strike-spotPrice)/spotPrice<0.02).reduce((a,s)=>a+s.gex,0);
    const totalCallOI=strikes.reduce((a,s)=>a+s.callOI,0);
    const totalPutOI=strikes.reduce((a,s)=>a+s.putOI,0);
    const pcr=totalPutOI/Math.max(totalCallOI,1);
    const totalGEX=cum;

    const upStrikes=strikes.filter(s=>s.strike>spotPrice&&s.strike<=spotPrice*1.05).sort((a,b)=>b.callHedge-a.callHedge).slice(0,4);
    const dnStrikes=strikes.filter(s=>s.strike<spotPrice&&s.strike>=spotPrice*0.95).sort((a,b)=>b.putHedge-a.putHedge).slice(0,4);
    const hedgeTargets=[...upStrikes,...dnStrikes];

    currentStrikes=strikes; priceHistory=[]; liveEvents=[];
    prevSpot=spotPrice;
    const d={strikes,spotPrice,flipZone,putWall,callWall,localGEX,totalGEX,pcr,exp,sym,upStrikes,dnStrikes,hedgeTargets};
    currentD=d;
    render(d);
    setStatus('live');
  } catch(e){
    console.error(e); setStatus('error');
    document.getElementById('main-area').innerHTML=`<div class="card"><div class="empty-state"><div class="empty-title">로드 실패</div><div class="empty-sub">${e.message}</div></div></div>`;
  } finally{btn.disabled=false;btn.textContent='⬇ 데이터 로드';}
}

// ── Vanna / Charm Exposure 계산 ──
// Vanna = ∂Δ/∂σ = vega × d2 / (S × σ × √T)  → 딜러 넷 포지션 기준 부호 반전
// Charm = ∂Δ/∂t (근사) = -N'(d1) × [r/(σ√T) - d2/(2T)]
function calculateVannaCharm(strikes, spotPrice, expDate) {
  const msToExp = new Date(expDate) - new Date();
  const T = Math.max(msToExp / (1000*60*60*24*365), 1/(365*24*60)); // 최소 1분
  const r = 0.045; // 무위험 이자율 근사

  let totalVanna = 0, totalCharm = 0;

  strikes.forEach(s => {
    const K = s.strike;
    const sigma = s.iv > 0 ? s.iv : 0.20; // IV 0이면 시장 평균 근사
    const sqrtT = Math.sqrt(T);
    const lnSK = Math.log(spotPrice / K);

    const d1 = (lnSK + (r + sigma*sigma/2)*T) / (sigma * sqrtT);
    const d2 = d1 - sigma * sqrtT;

    // 표준정규 PDF
    const nd1 = Math.exp(-d1*d1/2) / Math.sqrt(2*Math.PI);

    // Vanna Exposure = N'(d1) × d2/σ × OI_net × 계약승수(100)
    // 딜러는 매도 포지션 — 콜 OI는 딜러 숏콜, 풋 OI는 딜러 숏풋
    const netOI = s.callOI - s.putOI; // 양수: 콜 편중, 음수: 풋 편중
    const vanna = nd1 * (d2 / sigma) * netOI * 100 * spotPrice;
    totalVanna += isFinite(vanna) ? vanna : 0;

    // Charm Exposure = -N'(d1) × [r/(σ√T) - d2/(2T)] × netOI × 100
    const charm = -nd1 * (r/(sigma*sqrtT) - d2/(2*T)) * netOI * 100;
    totalCharm += isFinite(charm) ? charm : 0;
  });

  // M(백만) 단위 변환
  return { totalVanna: totalVanna/1e6, totalCharm: totalCharm/1e6 };
}

// ── 프리마켓 반전 분석 ──
// Vanna 양수 → IV 하락 시 딜러 매수 헷지 → 프리 상승 후 IV 수축 → 개장 후 하락 반전 압력
// Vanna 음수 → IV 하락 시 딜러 매도 헷지 → 프리 하락 후 IV 수축 → 개장 후 상승 반전 압력
function analyzePremarketReversal(d, vc, marketState, preMarketPct) {
  const { strikes, spotPrice, pcr, flipZone } = d;

  // 근처 ±8% 스트라이크 Put/Call Skew
  const near = strikes.filter(s => Math.abs(s.strike - spotPrice)/spotPrice < 0.08);
  const nearPutOI  = near.reduce((a,s)=>a+s.putOI, 0);
  const nearCallOI = near.reduce((a,s)=>a+s.callOI, 0);
  const putSkew = nearPutOI / Math.max(nearCallOI, 1);

  // 프리마켓 방향 추정 (preMarketPct: 양수=상승, 음수=하락)
  const preDir = preMarketPct == null ? null : (preMarketPct > 0 ? 'up' : 'down');
  const preAbs = Math.abs(preMarketPct || 0);

  // 반전 신호 강도 계산
  let score = 0;
  if (Math.abs(vc.totalVanna) > 7)  score += 3;
  else if (Math.abs(vc.totalVanna) > 4) score += 2;
  else if (Math.abs(vc.totalVanna) > 2) score += 1;
  if (putSkew > 1.7 || putSkew < 0.6) score += 2;
  else if (putSkew > 1.4 || putSkew < 0.75) score += 1;
  if (preAbs > 1.0) score += 1; // 프리마켓 이미 크게 움직인 경우

  // 방향 판단: Vanna 양수 + 프리 상승 = 개장 후 하락 반전 위험
  let reversalDir = null;
  if (vc.totalVanna > 0 && preDir === 'up')   reversalDir = '하락';
  if (vc.totalVanna < 0 && preDir === 'down')  reversalDir = '상승';

  // 메시지 생성
  let level = '', message = '', detail = '';
  const vannaSign = vc.totalVanna > 0 ? '양수' : '음수';
  const vannaDesc = vc.totalVanna > 0
    ? 'IV 하락 시 딜러 매수 헷지 → 개장 후 상승 지지 or 상단 IV 수축 반전'
    : 'IV 하락 시 딜러 매도 헷지 → 개장 후 하락 압력 or 하단 IV 수축 반전';

  if (score >= 5 && reversalDir) {
    level = 'warning';
    message = `⚠ 강한 프리마켓 반전 위험 — 개장 후 ${reversalDir} 전환 가능성`;
    detail = `Vanna ${vannaSign}(${vc.totalVanna.toFixed(1)}M) + Put/Call Skew ${putSkew.toFixed(2)} + 프리마켓 ${preAbs.toFixed(2)}% 이동. ${vannaDesc}.`;
  } else if (score >= 3) {
    level = 'caution';
    message = `⚡ 프리마켓 반전 주의${reversalDir ? ` — ${reversalDir} 방향 반전 관찰` : ''}`;
    detail = `Vanna ${vc.totalVanna.toFixed(1)}M / Put Skew ${putSkew.toFixed(2)}. 개장 초 변동성 확대 가능.`;
  } else {
    level = '';
    message = '현재 프리마켓 반전 신호 약함';
    detail = `Vanna ${vc.totalVanna.toFixed(1)}M / Put Skew ${putSkew.toFixed(2)} — 정상 범위.`;
  }

  return { level, message, detail, score, putSkew, reversalDir };
}

function buildNarrative(d, liveCtx) {
  liveCtx = liveCtx || {};
  const { spotPrice, upStrikes, dnStrikes, totalGEX } = d;
  const { livePrice=null, marketState='CLOSED', prevClose=null } = liveCtx;

  const top1Dn = dnStrikes[0], top1Up = upStrikes[0];
  if (!top1Dn && !top1Up) return null;

  const regime     = totalGEX >= 0 ? '양수(+)' : '음수(-)';
  const regimeDesc = totalGEX >= 0 ? '딜러가 변동성을 억제하는 방향(피닝)' : '딜러가 추세를 증폭하는 방향';
  let main = `현재 전체 GEX는 <b>${regime}</b> — ${regimeDesc}으로 헷지합니다.<br>`;
  if (top1Dn) { const d1 = ((spotPrice-top1Dn.strike)/spotPrice*100).toFixed(1); main += `하락 방향 최대 부담: <b>$${top1Dn.strike}</b>(-${d1}%)에 풋 헷지 집중.`; }
  if (top1Up) { const d1 = ((top1Up.strike-spotPrice)/spotPrice*100).toFixed(1); main += ` 상승 방향: <b>$${top1Up.strike}</b>(+${d1}%)에 콜 헷지 부담.`; }

  // ── 프리마켓 / 실시간 가격 반영 ──
  let progressNote = '';
  if (livePrice !== null) {
    const refPrice = (marketState === 'PRE' && prevClose) ? prevClose : spotPrice;
    const livePct  = (livePrice - refPrice) / refPrice * 100;
    const stateStr = marketState === 'PRE' ? '프리마켓' : marketState === 'POST' ? '애프터마켓' : '현재가';

    // 어떤 시나리오가 진행 중인지 판단
    const alreadyDn = top1Dn && livePrice <= top1Dn.strike;
    const alreadyDn2 = dnStrikes[1] && livePrice <= dnStrikes[1].strike;
    const alreadyUp  = top1Up && livePrice >= top1Up.strike;

    if (alreadyDn2) {
      progressNote = `<br><span style="color:var(--red);font-weight:600">⚠ ${stateStr} $${livePrice.toFixed(2)} (${livePct.toFixed(2)}%) — 하락 시나리오 2단계 이미 진행 중.</span> `
        + `$${top1Dn.strike}과 $${dnStrikes[1].strike} 모두 이탈. 딜러 추가 매도 헷지 가속 상태.`;
    } else if (alreadyDn) {
      progressNote = `<br><span style="color:var(--orange);font-weight:600">▼ ${stateStr} $${livePrice.toFixed(2)} (${livePct.toFixed(2)}%) — 하락 시나리오 1단계 진행 중.</span> `
        + `$${top1Dn.strike} 이탈. ${dnStrikes[1] ? `다음 관찰 구간: $${dnStrikes[1].strike}` : '추가 지지선 확인 필요'}.`;
    } else if (alreadyUp) {
      progressNote = `<br><span style="color:var(--green);font-weight:600">▲ ${stateStr} $${livePrice.toFixed(2)} (${livePct > 0 ? '+' : ''}${livePct.toFixed(2)}%) — 상승 시나리오 진행 중.</span> `
        + `$${top1Up.strike} 콜 헷지 구간 진입.`;
    } else {
      progressNote = `<br><span style="color:var(--text2)">${stateStr} $${livePrice.toFixed(2)} (${livePct > 0 ? '+' : ''}${livePct.toFixed(2)}%) — 아직 주요 헷지 구간 미진입.</span>`;
    }
  }

  let bear = '', bull = '';
  if (top1Dn) {
    const d1 = ((spotPrice-top1Dn.strike)/spotPrice*100).toFixed(1);
    const t2  = dnStrikes[1];
    bear = `<b>▼ 하락 심화:</b> $${top1Dn.strike}(-${d1}%) 이탈 확인 시`;
    if (t2) { const d2=((spotPrice-t2.strike)/spotPrice*100).toFixed(1); bear += ` → $${t2.strike}(-${d2}%)까지`; }
    bear += totalGEX < 0 ? ' 딜러 매도 동참으로 낙폭 가속 가능' : ' Positive GEX로 딜러가 일부 완충';
    bull = `<b>▲ VIX 수축·반등:</b> $${top1Dn.strike} 지지 + VIX 하락 시 딜러 풋헷지 되감기`;
    if (top1Up) { const d1=((top1Up.strike-spotPrice)/spotPrice*100).toFixed(1); bull += ` → $${top1Up.strike}(+${d1}%)까지 Vanna 반등 연료`; }
  }

  return { main: main + progressNote, bear, bull };
}

function render(d){
  const{strikes,spotPrice,flipZone,putWall,callWall,localGEX,totalGEX,pcr,exp,sym,upStrikes,dnStrikes}=d;
  const regime=totalGEX>=0?'positive':'negative';

  // Vanna / Charm 계산
  const vc = calculateVannaCharm(strikes, spotPrice, exp);
  const reversal = analyzePremarketReversal(d, vc, 'CLOSED', null);

  const alarms=[];
  const flipDist=flipZone?Math.abs(spotPrice-flipZone)/spotPrice*100:null;
  const putDist=putWall?(spotPrice-putWall)/spotPrice*100:null;
  if(!flipZone) alarms.push({l:'red',m:`GEX 전 구간 ${regime==='negative'?'음수':'양수'} — Flip Zone 없음`});
  else if(flipDist<0.5) alarms.push({l:'red',m:`Flip Zone ($${flipZone}) 극근접 ${flipDist.toFixed(2)}% — 방향 전환 임박`});
  else if(flipDist<1.5) alarms.push({l:'yellow',m:`Flip Zone ($${flipZone}) 근접 ${flipDist.toFixed(2)}%`});
  if(putDist!==null&&putDist<1) alarms.push({l:'red',m:`Put Wall ($${putWall}) 직하방 — 이탈 시 낙폭 가속`});
  alarms.push(localGEX<0?{l:'red',m:`로컬 GEX ${(localGEX/1e6).toFixed(1)}M — 딜러 추세 증폭`}:{l:'green',m:`로컬 GEX +${(localGEX/1e6).toFixed(1)}M — 딜러 변동성 억제`});
  if(pcr>1.5) alarms.push({l:'red',m:`PCR ${pcr.toFixed(2)} — 풋 편중 심화`});
  else if(pcr<0.7) alarms.push({l:'yellow',m:`PCR ${pcr.toFixed(2)} — 콜 편중`});

  const maxUp=Math.max(...upStrikes.map(s=>s.callHedge),1);
  const maxDn=Math.max(...dnStrikes.map(s=>s.putHedge),1);
  const rankCls=i=>['r1','r2','r3','r4'][i]||'r4';
  const upRows=upStrikes.map((s,i)=>{
    const dist=((s.strike-spotPrice)/spotPrice*100).toFixed(2);
    const pct=Math.round(s.callHedge/maxUp*100);
    return `<div class="hedge-row" data-strike="${s.strike}"><span class="hedge-rank ${rankCls(i)}">${i+1}</span><span class="hedge-strike">$${s.strike}</span><span class="hedge-dist">+${dist}%</span><div class="hedge-bar-wrap"><div class="hedge-bar up" style="width:${pct}%"></div></div><span class="hedge-pressure">${(s.callHedge/1e6).toFixed(1)}M</span></div>`;
  }).join('');
  const dnRows=dnStrikes.map((s,i)=>{
    const dist=((spotPrice-s.strike)/spotPrice*100).toFixed(2);
    const pct=Math.round(s.putHedge/maxDn*100);
    return `<div class="hedge-row" data-strike="${s.strike}"><span class="hedge-rank ${rankCls(i)}">${i+1}</span><span class="hedge-strike">$${s.strike}</span><span class="hedge-dist">-${dist}%</span><div class="hedge-bar-wrap"><div class="hedge-bar dn" style="width:${pct}%"></div></div><span class="hedge-pressure">${(s.putHedge/1e6).toFixed(1)}M</span></div>`;
  }).join('');

  const narr=buildNarrative(d, {});  // 최초 로드 시 liveCtx 없음 — null 대신 {} 전달로 방어
  const chartData=strikes.filter(s=>Math.abs(s.strike-spotPrice)/spotPrice<0.08);
  const tableData=strikes.filter(s=>Math.abs(s.strike-spotPrice)/spotPrice<0.10);

  const vixDisplay = vixVal ? vixVal.toFixed(2) : '—';
  const vvixDisplay = vvixVal ? vvixVal.toFixed(2) : '—';
  const vixCls = vixVal ? (vixVal>30?'danger':vixVal>20?'warn':'') : '';
  const vvixCls = vvixVal ? (vvixVal>130?'danger':vvixVal>110?'warn':'') : '';

  document.getElementById('main-area').innerHTML=`
  <div class="card">
    <div class="card-title">${sym} · 만기 ${exp} · 종가 기준 $${spotPrice.toFixed(2)}</div>
    <div class="regime-bar ${regime}">${regime==='positive'?'✚ Positive GEX — 딜러 변동성 억제 (피닝)':'▼ Negative GEX — 딜러 추세 증폭'}</div>
    <div id="alarm-list"></div>
    <div class="metrics">
      <div class="metric blue" id="metric-spot"><div class="val">$${spotPrice.toFixed(1)}</div><div class="lbl">현재가</div></div>
      <div class="metric ${flipZone?'orange':''}"><div class="val">${flipZone?'$'+flipZone:'없음'}</div><div class="lbl">Flip Zone</div></div>
      <div class="metric ${pcr>1.5?'red':pcr<0.7?'yellow':''}"><div class="val">${pcr.toFixed(2)}</div><div class="lbl">Put/Call</div></div>
      <div class="metric red"><div class="val">${putWall?'$'+putWall:'—'}</div><div class="lbl">Put Wall</div></div>
      <div class="metric green"><div class="val">${callWall?'$'+callWall:'—'}</div><div class="lbl">Call Wall</div></div>
      <div class="metric ${localGEX<0?'red':'green'}"><div class="val">${(localGEX/1e6).toFixed(1)}M</div><div class="lbl">Local GEX</div></div>
      <div class="metric ${vixCls}" id="metric-vix"><div class="val">${vixDisplay}</div><div class="lbl">VIX</div></div>
      <div class="metric ${vvixCls}" id="metric-vvix"><div class="val">${vvixDisplay}</div><div class="lbl">VVIX</div></div>
      <div class="metric ${vc.totalVanna>4?'red':vc.totalVanna<-4?'green':''}" id="metric-vanna"><div class="val">${vc.totalVanna.toFixed(1)}M</div><div class="lbl">Vanna Exp</div></div>
      <div class="metric ${Math.abs(vc.totalCharm)>2?'yellow':''}" id="metric-charm"><div class="val">${vc.totalCharm.toFixed(1)}M</div><div class="lbl">Charm Exp</div></div>
    </div>

    <div class="premarket-panel ${reversal.level}" id="premarket-panel">
      <div class="pm-header">
        <div class="pm-title">◈ 프리마켓 반전 탐지</div>
      </div>
      <div class="pm-message" id="pm-message">${reversal.message}</div>
      <div class="pm-detail" id="pm-detail">${reversal.detail}</div>
      <div class="pm-metrics">
        <div class="pm-stat">Vanna: <b id="pm-vanna">${vc.totalVanna.toFixed(1)}M</b></div>
        <div class="pm-stat">Charm: <b id="pm-charm">${vc.totalCharm.toFixed(1)}M</b></div>
        <div class="pm-stat">Put Skew: <b id="pm-skew">${reversal.putSkew.toFixed(2)}</b></div>
        <div class="pm-stat" id="pm-score-wrap">반전 점수: <b id="pm-score">${reversal.score}/6</b></div>
      </div>
    </div>

    <div class="hedge-section">
      <div class="hedge-title">딜러 헷지 부담 집중 스트라이크 (γ × OI 기준)</div>
      <div class="hedge-grid">
        <div><div class="hedge-col-label" style="color:var(--green)">▲ 상승 — 콜 헷지 Top4</div>${upRows||'<div style="color:var(--text3);font-size:13px;padding:8px">데이터 없음</div>'}</div>
        <div><div class="hedge-col-label" style="color:var(--red)">▼ 하락 — 풋 헷지 Top4</div>${dnRows||'<div style="color:var(--text3);font-size:13px;padding:8px">데이터 없음</div>'}</div>
      </div>
    </div>

    ${narr?`<div class="narrative"><div class="narrative-title">◈ 시장 구조 분석</div><div class="narrative-body" id="narrative-body">${narr.main}</div>${narr.bear?`<div class="scenario bear" id="scenario-bear">${narr.bear}</div>`:''} ${narr.bull?`<div class="scenario bull" id="scenario-bull">${narr.bull}</div>`:''}</div>`:''}

    <div class="live-judgment" id="live-judgment">
      <div class="lj-header"><div class="lj-dot"></div><div class="lj-title">실시간 상황 판단</div></div>
      <div class="lj-trend neutral" id="lj-trend">자동갱신 ON 후 활성화됩니다</div>
      <div class="lj-events" id="lj-events"></div>
    </div>

    <div class="unwind-panel" id="unwind-panel">
      <div class="unwind-title">⚡ 딜러 언와인드 감지</div>
      <div class="unwind-status" id="unwind-content"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">OI 분포 + GEX</div>
    <div class="chart-controls">
      <span class="zoom-label">확대</span>
      <input type="range" class="zoom-slider" id="zoom-slider" min="1" max="6" step="0.5" value="1" oninput="updateZoom(this.value)">
      <span class="zoom-val" id="zoom-val">1×</span>
      <span class="scroll-hint">← 가로 스크롤 →</span>
    </div>
    <div class="chart-scroll-wrap" id="chart-scroll-wrap">
      <div class="chart-inner" id="chart-inner"><canvas id="mainchart"></canvas></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">스트라이크별 상세 — 현재가 ±10%</div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Strike</th><th>Call OI</th><th>Put OI</th><th>GEX(M)</th><th>Call Vol</th><th>Put Vol</th><th>IV</th></tr></thead>
      <tbody id="tbl-body"></tbody>
    </table></div>
  </div>`;

  // 알람
  const al=document.getElementById('alarm-list');
  (alarms.length?alarms:[{l:'green',m:'특이 리스크 없음'}]).forEach(a=>{
    const div=document.createElement('div'); div.className=`alarm ${a.l}`; div.textContent=a.m; al.appendChild(div);
  });

  // 차트
  buildChart(chartData,spotPrice,flipZone,putWall,callWall);

  // 테이블
  const tbody=document.getElementById('tbl-body');
  tableData.forEach(s=>{
    const isCur=Math.abs(s.strike-spotPrice)<0.5;
    const isFlip=s.strike===flipZone,isPW=s.strike===putWall,isCW=s.strike===callWall;
    const tr=document.createElement('tr');
    if(isCur)tr.className='cur'; else if(isFlip)tr.className='flip';
    let tags='';
    if(isCur) tags+=`<span class="tag tag-cur">현재가</span>`;
    if(isFlip)tags+=`<span class="tag tag-flip">Flip</span>`;
    if(isPW)  tags+=`<span class="tag tag-pw">Put Wall</span>`;
    if(isCW)  tags+=`<span class="tag tag-cw">Call Wall</span>`;
    const gc=s.gex>=0?'#3fb950':'#f85149';
    tr.innerHTML=`<td>$${s.strike}${tags}</td><td>${s.callOI.toLocaleString()}</td><td>${s.putOI.toLocaleString()}</td><td style="color:${gc};font-weight:600">${s.gex>=0?'+':''}${(s.gex/1e6).toFixed(2)}</td><td>${s.callVol.toLocaleString()}</td><td>${s.putVol.toLocaleString()}</td><td>${s.iv>0?(s.iv*100).toFixed(1)+'%':'—'}</td>`;
    tbody.appendChild(tr);
  });
}

function buildChart(chartData, sp, flipZone, putWall, callWall) {
  if (chartInst){chartInst.destroy();chartInst=null;}
  const wrap=document.getElementById('chart-scroll-wrap');
  const inner=document.getElementById('chart-inner');
  const baseW=wrap.clientWidth||window.innerWidth-56;
  inner.style.width=Math.max(baseW, baseW*zoomLevel)+'px';

  // 호버 시 점 색상 변경 플러그인
  const hoverDotPlugin = {
    id:'hoverDot',
    afterDraw(chart){
      const idx=chart._hoveredIdx;
      if(idx===undefined||idx===null) return;
      const ds=chart.data.datasets[2]; // GEX 라인
      const meta=chart.getDatasetMeta(2);
      if(!meta||!meta.data[idx]) return;
      const pt=meta.data[idx];
      const ctx=chart.ctx;
      ctx.save();
      ctx.beginPath();
      ctx.arc(pt.x,pt.y,6,0,Math.PI*2);
      ctx.fillStyle='#f85149'; // 빨간 점
      ctx.strokeStyle='#fff';
      ctx.lineWidth=1.5;
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }
  };

  chartInst=new Chart(document.getElementById('mainchart'),{
    data:{
      labels:chartData.map(s=>{
        // 5달러 단위만 표시
        return s.strike%5===0?'$'+s.strike:'';
      }),
      datasets:[
        {type:'bar', label:'Call OI', data:chartData.map(s=>s.callOI),  backgroundColor:'rgba(88,166,255,.4)',yAxisID:'y'},
        {type:'bar', label:'Put OI',  data:chartData.map(s=>-s.putOI),  backgroundColor:'rgba(248,81,73,.4)', yAxisID:'y'},
        {type:'line',label:'GEX(M)',  data:chartData.map(s=>+(s.gex/1e6).toFixed(3)),
         borderColor:'#f0883e',backgroundColor:'transparent',
         pointRadius:3,pointBackgroundColor:'#f0883e',pointHoverBackgroundColor:'#f85149',
         pointHoverRadius:7,pointHoverBorderColor:'#fff',pointHoverBorderWidth:1.5,
         borderWidth:2.5,tension:.3,yAxisID:'y2'},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      onHover:(e,els)=>{
        if(chartInst) chartInst._hoveredIdx=els.length?els[0].index:null;
      },
      plugins:{
        legend:{display:true,position:'top',align:'start',labels:{color:'#8b949e',font:{size:12},boxWidth:12,padding:16}},
        tooltip:{
          backgroundColor:'#161b22',borderColor:'#30363d',borderWidth:1,
          titleColor:'#e6edf3',bodyColor:'#8b949e',padding:12,
          callbacks:{
            title: items=>'$'+chartData[items[0].dataIndex]?.strike,
            afterBody: items=>{
              const s=chartData[items[0].dataIndex]; if(!s) return [];
              const lines=[];
              if(s.iv>0) lines.push(`IV: ${(s.iv*100).toFixed(1)}%`);
              if(s.strike===flipZone) lines.push('⚡ Flip Zone');
              if(s.strike===putWall)  lines.push('🔴 Put Wall');
              if(s.strike===callWall) lines.push('🟢 Call Wall');
              return lines;
            }
          }
        },
      },
      scales:{
        x:{ticks:{color:'#6e7681',font:{size:11},autoSkip:false,maxRotation:45},grid:{color:'rgba(48,54,61,.7)'}},
        y:{position:'left', ticks:{color:'#6e7681',font:{size:11},callback:v=>v>=1000?Math.round(v/1000)+'K':v}, grid:{color:'rgba(48,54,61,.7)'}},
        y2:{position:'right',ticks:{color:'#f0883e',font:{size:11},callback:v=>v+'M'},grid:{drawOnChartArea:false}},
      }
    },
    plugins:[hoverDotPlugin]
  });
}

function updateZoom(val){
  zoomLevel=parseFloat(val);
  document.getElementById('zoom-val').textContent=val+'×';
  if(!currentD) return;
  const chartData=currentStrikes.filter(s=>Math.abs(s.strike-currentD.spotPrice)/currentD.spotPrice<0.08);
  buildChart(chartData,currentD.spotPrice,currentD.flipZone,currentD.putWall,currentD.callWall);
}
</script>
