<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>딜러 리스크 대시보드 v6.4</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --blue:#58a6ff;--blue-dim:#1f6feb;--green:#3fb950;--red:#f85149;
  --yellow:#d29922;--orange:#f0883e;--purple:#bc8cff;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'SF Mono','Fira Code','Consolas',monospace;
}
html,body{width:100%;min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px}

.header{display:flex;align-items:center;justify-content:space-between;padding:12px 28px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:14px}
.logo{font-size:18px;font-weight:700;letter-spacing:-.3px}
.logo span{color:var(--orange)}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0}
.status-dot.live{background:var(--green);box-shadow:0 0 7px var(--green)}
.status-dot.updating{background:var(--yellow);animation:pulse 1s infinite}
.status-text{font-size:13px;color:var(--text2)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.ctrl-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:10px 28px;border-bottom:1px solid var(--border);background:var(--bg2)}
select,button{font-family:var(--font);font-size:14px}
.sym-select,.exp-select{background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:7px 12px;cursor:pointer}
.exp-select{min-width:180px}
.load-btn{background:var(--blue-dim);color:var(--blue);border:1px solid var(--blue-dim);border-radius:6px;padding:7px 22px;cursor:pointer;font-weight:600;transition:all .15s}
.load-btn:hover:not(:disabled){background:var(--blue);color:#000}
.load-btn:disabled{opacity:.4;cursor:not-allowed}
.auto-btn{background:var(--bg3);color:var(--text3);border:1px solid var(--border);border-radius:6px;padding:7px 14px;cursor:pointer;font-size:13px;transition:all .2s;display:flex;align-items:center;gap:6px}
.auto-btn.on{border-color:rgba(63,185,80,.5);color:var(--green);background:rgba(63,185,80,.08)}
.auto-btn .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.auto-btn.on .dot{animation:pulse 1s infinite}
.ctrl-spacer{flex:1}
.data-time{font-size:12px;color:var(--text3);font-family:var(--mono)}

.main{width:100%;padding:20px 28px;display:flex;flex-direction:column;gap:20px}
.card{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:22px 28px}
.card-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:16px}

.regime-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:7px;margin-bottom:16px;font-size:15px;font-weight:600}
.regime-bar.positive{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.25);color:#7ee787}
.regime-bar.negative{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.25);color:#ffa198}

.alarm{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:7px;margin-bottom:7px;font-size:14px;font-weight:500}
.alarm::before{content:'';width:7px;height:7px;border-radius:50%;flex-shrink:0}
.alarm.red{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:#ffa198}
.alarm.red::before{background:var(--red);box-shadow:0 0 5px var(--red)}
.alarm.yellow{background:rgba(210,153,34,.1);border:1px solid rgba(210,153,34,.3);color:#e3b341}
.alarm.yellow::before{background:var(--yellow)}
.alarm.green{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.3);color:#7ee787}
.alarm.green::before{background:var(--green)}

.metrics{display:grid;grid-template-columns:repeat(10,1fr);gap:10px;margin-top:16px}
@media(max-width:1400px){.metrics{grid-template-columns:repeat(5,1fr)}}
@media(max-width:700px){.metrics{grid-template-columns:repeat(2,1fr)}}
.metric{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px 12px;text-align:center;transition:border-color .3s}
.metric .val{font-size:20px;font-weight:700;color:var(--text);margin-bottom:4px;font-family:var(--mono)}
.metric .lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.metric.red .val{color:var(--red)}.metric.green .val{color:var(--green)}
.metric.yellow .val{color:var(--yellow)}.metric.blue .val{color:var(--blue)}
.metric.orange .val{color:var(--orange)}.metric.purple .val{color:var(--purple)}
.metric.warn .val{color:var(--yellow)}.metric.danger .val{color:var(--red)}
.metric.pre-market{border-color:rgba(188,140,255,.5)}
.metric.post-market{border-color:rgba(240,136,62,.5)}

.hedge-section{margin-top:20px}
.hedge-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.hedge-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:700px){.hedge-grid{grid-template-columns:1fr}}
.hedge-col-label{font-size:12px;color:var(--text3);margin-bottom:8px;font-weight:600}
.hedge-row{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);margin-bottom:6px;transition:background .15s}
.hedge-row:hover{background:#252b33}
.hedge-rank{font-size:11px;font-weight:700;width:18px;text-align:center;flex-shrink:0}
.hedge-rank.r1{color:var(--red)}.hedge-rank.r2{color:var(--orange)}.hedge-rank.r3{color:var(--yellow)}.hedge-rank.r4{color:var(--text2)}
.hedge-strike{font-size:15px;font-weight:700;font-family:var(--mono);color:var(--text);flex:1}
.hedge-dist{font-size:11px;color:var(--text2);width:44px;text-align:right;flex-shrink:0}
.hedge-bar-wrap{width:70px;height:5px;background:var(--bg);border-radius:3px;flex-shrink:0}
.hedge-bar{height:5px;border-radius:3px}
.hedge-bar.up{background:var(--green)}.hedge-bar.dn{background:var(--red)}
.hedge-pressure{font-size:11px;color:var(--text3);font-family:var(--mono);width:46px;text-align:right;flex-shrink:0}

/* ── 통합 상황판단 패널 ── */
.judgment-panel{margin-top:16px;border-radius:8px;border:1px solid rgba(88,166,255,.2);background:rgba(88,166,255,.04);overflow:hidden}
.judgment-fixed{padding:16px 18px;border-bottom:1px solid rgba(48,54,61,.8)}
.judgment-fixed-title{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.judgment-fixed-title::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--blue)}
.judgment-item{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;font-size:13px;line-height:1.6;color:var(--text2)}
.judgment-item:last-child{margin-bottom:0}
.judgment-item .ji-icon{flex-shrink:0;font-size:14px;margin-top:1px}
.judgment-item .ji-text b{color:var(--text)}
.judgment-item.ji-green .ji-icon{color:var(--green)}
.judgment-item.ji-red .ji-icon{color:var(--red)}
.judgment-item.ji-yellow .ji-icon{color:var(--yellow)}
.judgment-item.ji-blue .ji-icon{color:var(--blue)}
.judgment-item.ji-orange .ji-icon{color:var(--orange)}

.judgment-live{padding:14px 18px;max-height:260px;overflow-y:auto}
.judgment-live-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.judgment-live-title .live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
.live-event{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid rgba(48,54,61,.5);font-size:12px;line-height:1.5}
.live-event:last-child{border-bottom:none}
.live-event .le-time{color:var(--text3);font-family:var(--mono);flex-shrink:0;min-width:52px}
.live-event .le-msg{color:var(--text2)}
.live-event.le-warn .le-msg{color:#e3b341}
.live-event.le-danger .le-msg{color:#ffa198}
.live-event.le-good .le-msg{color:#7ee787}
.live-event.le-info .le-msg{color:#9ecbff}

/* ── Greek 메트릭 카드 ── */
.greek-metric-card{flex:1;min-width:130px;padding:10px 14px;background:var(--bg3);border-radius:8px;border:1px solid var(--border)}
.gmc-header{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.gmc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.gmc-name{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;flex:1}
.gmc-signal{font-size:16px;line-height:1}
.gmc-value{font-size:18px;font-weight:700;font-family:var(--mono);letter-spacing:-.5px;margin-bottom:3px}
.gmc-desc{font-size:11px;color:var(--text3);line-height:1.4}

/* ── Greek 힘의 균형 패널 (레거시, 숨김) ── */
.vc-panel-wrap{display:flex;gap:0;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--bg2)}
.force-sidebar{width:220px;flex-shrink:0;padding:18px 16px;background:var(--bg3);border-right:1px solid var(--border)}
.force-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px}
.force-item{margin-bottom:16px}
.force-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.force-name{font-size:12px;font-weight:600;color:var(--text2)}
.force-pct{font-size:12px;font-weight:700;font-family:var(--mono)}
.force-bar-bg{height:8px;background:var(--bg);border-radius:4px;overflow:hidden;position:relative}
.force-bar-fill{height:100%;border-radius:4px;transition:width .5s ease,background .5s ease}
.force-status{font-size:11px;color:var(--text3);margin-top:4px}
.force-divider{height:1px;background:var(--border);margin:14px 0}
.force-summary{font-size:12px;line-height:1.6;color:var(--text2)}
.force-summary b{color:var(--text)}

.vc-chart-area{flex:1;padding:18px 20px;min-width:0}
.vc-chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.vc-chart-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.vc-tabs{display:flex;gap:6px}
.vc-tab{font-size:12px;padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-family:var(--font)}
.vc-tab.active{background:var(--blue-dim);color:var(--blue);border-color:var(--blue-dim)}
.vc-zoom-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.vc-zoom-label{font-size:11px;color:var(--text3)}
.vc-zoom-slider{-webkit-appearance:none;width:120px;height:4px;border-radius:2px;background:var(--bg3);outline:none;cursor:pointer}
.vc-zoom-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--blue);cursor:pointer}
.vc-zoom-val{font-size:11px;color:var(--blue);font-family:var(--mono);min-width:24px}
.vc-scroll-wrap{overflow-x:auto;overflow-y:hidden;border-radius:6px;border:1px solid var(--border)}
.vc-scroll-wrap::-webkit-scrollbar{height:4px}
.vc-scroll-wrap::-webkit-scrollbar-track{background:var(--bg3)}
.vc-scroll-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.vc-chart-inner{position:relative;height:220px;min-width:100%}
.vc-empty{text-align:center;padding:60px 0;color:var(--text3);font-size:13px}

/* ── 차트 ── */
.chart-controls{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.zoom-label{font-size:12px;color:var(--text3)}
.zoom-slider{-webkit-appearance:none;width:160px;height:4px;border-radius:2px;background:var(--bg3);outline:none;cursor:pointer}
.zoom-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--blue);cursor:pointer}
.zoom-val{font-size:12px;color:var(--blue);font-family:var(--mono);min-width:30px}
.scroll-hint{font-size:12px;color:var(--text3)}
.chart-scroll-wrap{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;border-radius:6px;border:1px solid var(--border)}
.chart-scroll-wrap::-webkit-scrollbar{height:5px}
.chart-scroll-wrap::-webkit-scrollbar-track{background:var(--bg3)}
.chart-scroll-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.chart-inner{position:relative;height:460px;min-width:100%}

.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:13px;color:var(--text3);font-weight:500;text-align:right;padding:10px 14px;border-bottom:1px solid var(--border);white-space:nowrap}
th:first-child{text-align:left}
td{padding:8px 14px;text-align:right;font-size:13px;border-bottom:1px solid rgba(48,54,61,.5);color:var(--text2);font-family:var(--mono)}
td:first-child{text-align:left;font-family:var(--font);font-weight:600;color:var(--text)}
tr:hover td{background:rgba(255,255,255,.02)}
tr.cur td{background:rgba(88,166,255,.07)}
tr.flip td{background:rgba(240,136,62,.06)}
.tag{display:inline-block;font-size:10px;padding:2px 6px;border-radius:3px;margin-left:5px;font-weight:700}
.tag-cur{background:rgba(88,166,255,.2);color:var(--blue)}
.tag-flip{background:rgba(240,136,62,.2);color:var(--orange)}
.tag-pw{background:rgba(248,81,73,.2);color:var(--red)}
.tag-cw{background:rgba(63,185,80,.2);color:var(--green)}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:90px 24px;gap:16px;color:var(--text3)}
.empty-icon{font-size:44px;opacity:.35}
.empty-title{font-size:17px;font-weight:500;color:var(--text2)}
.empty-sub{font-size:14px;text-align:center;line-height:1.7}
.spinner{width:38px;height:38px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">Dr.<span>Balance</span> GEX</div>
    <div class="status-dot" id="status-dot"></div>
    <div class="status-text" id="status-text">대기 중</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div style="font-size:11px;color:var(--text3);font-family:var(--mono);background:var(--bg3);padding:2px 7px;border-radius:4px;border:1px solid var(--border)">v6.10 · CBOE</div>
    <div style="font-size:12px;color:var(--text3);font-family:var(--mono)">api.drbalance.xyz</div>
    <div class="data-time" id="data-time"></div>
  </div>
</div>

<div class="ctrl-bar">
  <select class="sym-select" id="sym-select">
    <option value="SPY">SPY</option>
    <option value="QQQ">QQQ</option>
    <option value="_SPX">SPX</option>
    <option value="_NDX">NDX</option>
  </select>
  <select class="exp-select" id="exp-select"><option value="">로드 중...</option></select>
  <button class="load-btn" id="load-btn" onclick="loadData()">⬇ 데이터 로드</button>
  <button class="auto-btn" id="auto-btn" onclick="toggleAuto()">
    <div class="dot"></div><span id="auto-label">자동갱신 OFF</span>
  </button>
  <div class="ctrl-spacer"></div>
</div>

<div class="main" id="main-area">
  <div class="card">
    <div class="empty-state">
      <div class="empty-icon">◈</div>
      <div class="empty-title">심볼 선택 후 데이터 로드를 눌러주세요</div>
      <div class="empty-sub">CBOE 15분 지연 · CSV 불필요 · 버튼 한 번으로 옵션 체인 자동 로드</div>
    </div>
  </div>
</div>

<script>
const PROXY = 'https://api.drbalance.xyz';
let chartInst = null, vcChartInst = null;
let allOptions = [], spotPrice = 0, vixVal = null, vvixVal = null;
let currentStrikes = [], currentD = null;
let autoInterval = null;
let liveEvents = [];
let priceHistory = [];
let vcHistory = []; // {time, vanna, charm, gex, vix, spot}
let vcActiveTab = 'vanna';
let vcZoom = 1;
let zoomLevel = 1;
let prevSpot = null;

window.addEventListener('DOMContentLoaded', () => { loadExpirations(); loadVIX(); });
document.getElementById('sym-select').addEventListener('change', () => { allOptions=[]; loadExpirations(); });

async function loadVIX() {
  try {
    const json = await fetch(`${PROXY}/api/vix?symbols=VIX,VVIX`).then(r=>r.json());
    vixVal = json.VIX?.price;
    vvixVal = json.VVIX?.price;
    updateVIXMetrics();
  } catch(e){}
}

function updateVIXMetrics() {
  const vm = document.getElementById('metric-vix');
  const vvm = document.getElementById('metric-vvix');
  if (vm && vixVal != null) {
    vm.querySelector('.val').textContent = vixVal.toFixed(2);
    vm.className = 'metric' + (vixVal>30?' danger':vixVal>20?' warn':'');
  }
  if (vvm && vvixVal != null) {
    vvm.querySelector('.val').textContent = vvixVal.toFixed(2);
    vvm.className = 'metric' + (vvixVal>130?' danger':vvixVal>110?' warn':'');
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Vanna / Charm 계산 (safeT 클램핑으로 수치 안정화)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function calculateVannaCharm(strikes, spotPrice, expDate) {
  const msToExp = new Date(expDate) - new Date();
  const T = Math.max(msToExp / (1000*60*60*24*365), 1/365);
  const safeT = Math.max(T, 0.5/365);
  const r = 0.045;
  let totalVanna = 0, totalCharm = 0;
  strikes.forEach(s => {
    const K = s.strike;
    const sigma = s.iv > 0 ? s.iv : 0.20;
    const sqrtT = Math.sqrt(T);
    const safeSqrtT = Math.sqrt(safeT);
    const lnSK = Math.log(spotPrice / K);
    const d1 = (lnSK + (r + sigma*sigma/2)*T) / (sigma * sqrtT);
    const d2 = d1 - sigma * sqrtT;
    const nd1 = Math.exp(-d1*d1/2) / Math.sqrt(2*Math.PI);
    const netOI = s.callOI - s.putOI;
    const vanna = nd1 * (d2 / sigma) * netOI * 100 * spotPrice;
    totalVanna += isFinite(vanna) ? vanna : 0;
    const charm = -nd1 * (r/(sigma*safeSqrtT) - d2/(2*safeT)) * netOI * 100;
    totalCharm += isFinite(charm) ? charm : 0;
  });
  return { totalVanna: totalVanna/1e6, totalCharm: totalCharm/1e6 };
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Greek 힘의 균형 계산
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function calcForceBalance(vc, d, vix, vvix) {
  const { totalVanna, totalCharm } = vc;
  const { localGEX, totalGEX, flipZone, spotPrice } = d;

  // Vanna 활성도: VIX 변화율 × Vanna 절대값
  const vixHistory = priceHistory.slice(-5).map(h=>h.vix).filter(Boolean);
  const vixChange = vixHistory.length >= 2
    ? (vixHistory[vixHistory.length-1] - vixHistory[0]) / vixHistory[0] * 100
    : 0;

  // 각 Greek 강도 (0~100%)
  const vannaStrength = Math.min(Math.abs(totalVanna) / 50 * 100, 100);
  const charmStrength = Math.min(Math.abs(totalCharm) / 20 * 100, 100);
  const gexStrength = Math.min(Math.abs(localGEX/1e6) / 50 * 100, 100);

  // Vanna 활성화 여부 (VIX 움직임 필요)
  const vannaActive = Math.abs(vixChange) > 0.5;
  const vannaDir = totalVanna < 0 ? 'sell' : 'buy'; // 음수Vanna = VIX상승시 매도

  // Charm 활성화 여부 (시간 기반)
  const now = new Date();
  const est = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
  const estHour = est.getHours() + est.getMinutes()/60;
  const isAfternoon = estHour >= 13 && estHour < 16;
  const charmDir = totalCharm < 0 ? 'buy' : 'sell';
  const charmActive = isAfternoon;

  // GEX 방향
  const gexDir = totalGEX >= 0 ? 'pin' : 'trend';

  // Flip Zone 거리
  const flipDist = flipZone ? Math.abs(spotPrice - flipZone) / spotPrice * 100 : 999;
  const flipDanger = flipDist < 1.0;

  return {
    vanna: { strength: vannaStrength, dir: vannaDir, active: vannaActive, value: totalVanna, vixChange },
    charm: { strength: charmStrength, dir: charmDir, active: charmActive, value: totalCharm },
    gex: { strength: gexStrength, dir: gexDir, value: localGEX/1e6 },
    flipDist, flipDanger,
    estHour, isAfternoon
  };
}

function renderGreekMetrics(force) {
  const { vanna, charm, gex, flipDist, flipDanger } = force;

  // ── Vanna 신호등 ──
  // 5분 전 대비 절대값 변화로 판단
  const vannaHistory = vcHistory.slice(-5).map(h => Math.abs(h.vanna)).filter(v => v > 0);
  let vannaSignal = '⚪'; // 데이터 부족
  let vannaArrow = '';
  if (vannaHistory.length >= 2) {
    const prev = vannaHistory[0];
    const curr = vannaHistory[vannaHistory.length - 1];
    const chg = (curr - prev) / prev * 100;
    if (chg > 5)       { vannaSignal = '🔴'; vannaArrow = ' ↑'; } // 강해짐 (더 위험)
    else if (chg < -5) { vannaSignal = '🟢'; vannaArrow = ' ↓'; } // 약해짐 (완화)
    else               { vannaSignal = '🟡'; vannaArrow = ' →'; } // 비슷
  }

  // ── Charm 신호등 ──
  // 오후 1시(ET) 이후 활성화, 음수(매수드리프트)면 초록
  const charmSignal = charm.active
    ? (charm.dir === 'buy' ? '🟢' : '🔴')
    : '⚪';
  const charmArrow = charm.active ? ' 활성' : ' 대기';

  // ── GEX 신호등 ──
  const gexSignal = gex.dir === 'pin' ? '🟢' : '🔴';
  const gexArrow = gex.dir === 'pin' ? ' 피닝' : ' 추세증폭';

  // ── Vanna 값 색상 ──
  const vannaColor = vanna.dir === 'sell' ? 'var(--red)' : 'var(--green)';
  const charmColor = charm.dir === 'buy'  ? 'var(--green)' : 'var(--red)';
  const gexColor   = gex.dir === 'pin'   ? 'var(--green)' : 'var(--red)';

  // ── 지배 Greek 판단 ──
  let dominant = '';
  const vannaAbs = Math.abs(vanna.value);
  const charmAbs = Math.abs(charm.value);
  if (gex.dir === 'pin' && Math.abs(gex.value) > 500)
    dominant = 'GEX 피닝 지배 — 큰 방향성 어려움';
  else if (vanna.active && vannaAbs > charmAbs * 5)
    dominant = `Vanna ${vanna.dir === 'sell' ? '매도' : '매수'} 압력 지배`;
  else if (charm.active && charmAbs > 200)
    dominant = `Charm ${charm.dir === 'buy' ? '매수' : '매도'} 드리프트 작동`;
  else
    dominant = '뚜렷한 지배 Greek 없음';

  // ── DOM 업데이트 ──
  const set = (id, val) => { const el=document.getElementById(id); if(el) el.innerHTML=val; };

  set('gmc-vanna-signal', vannaSignal);
  set('gmc-vanna-val', `<span style="color:${vannaColor}">${vanna.value.toFixed(0)}M</span>`);
  set('gmc-vanna-desc', `${vanna.dir === 'sell' ? 'VIX↑ 매도압력' : 'VIX↑ 매수압력'}${vannaArrow}${vanna.vixChange !== 0 ? ` · VIX ${vanna.vixChange>0?'+':''}${vanna.vixChange.toFixed(1)}%` : ''}`);

  set('gmc-charm-signal', charmSignal);
  set('gmc-charm-val', `<span style="color:${charmColor}">${charm.value.toFixed(0)}M</span>`);
  set('gmc-charm-desc', `${charm.dir === 'buy' ? '매수 드리프트' : '매도 드리프트'}${charmArrow}`);

  set('gmc-gex-signal', gexSignal);
  set('gmc-gex-val', `<span style="color:${gexColor}">${gex.value > 0 ? '+' : ''}${gex.value.toFixed(0)}M</span>`);
  set('gmc-gex-desc', `로컬 GEX${gexArrow}`);

  set('gmc-dominant-val', dominant);
  set('gmc-flip-desc', flipZone
    ? (flipDanger
      ? `<span style="color:var(--red);font-weight:600">⚡ Flip Zone ${flipDist.toFixed(1)}% 극근접</span>`
      : `Flip Zone ${flipDist.toFixed(1)}% 하방`)
    : 'Flip Zone 없음'
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

// 섬머타임 감지 (미국 동부 기준)
function isEDT() {
  // 브라우저 타임존(KST)이 아닌 미국 동부 시간 기준으로 섬머타임 감지
  const now = new Date();
  const etStr = now.toLocaleString('en-US', { timeZone: 'America/New_York', timeZoneName: 'short' });
  return etStr.includes('EDT');
}

// 프리장~마감 KST 시간 라벨 생성 (1분 단위)
function buildTimeAxis() {
  const labels = [];
  // 섬머타임: 프리 4:00 AM ET = KST 17:00 / 마감 4:00 PM ET = KST 05:00+1
  // 표준시:   프리 4:00 AM ET = KST 18:00 / 마감 4:00 PM ET = KST 06:00+1
  const preHourKST = isEDT() ? 17 : 18;  // 프리장 시작 KST 시
  const closeHourKST = preHourKST + 12;  // 마감 KST 시 (정규장 6.5h + 프리 6.5h = 12h 이내)
  // 총 분: 4:00 AM ET ~ 4:00 PM ET = 12시간 = 720분
  for (let m = 0; m < 720; m++) {
    const totalMin = preHourKST * 60 + m;
    const h = Math.floor(totalMin / 60) % 24;
    const min = totalMin % 60;
    // 주요 시간만 라벨 표시 (30분 단위)
    if (min % 30 === 0) {
      labels.push(`${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}`);
    } else {
      labels.push('');
    }
  }
  return labels;
}

// vcHistory 항목을 시간축 인덱스로 변환
function getTimeIndex(timeStr) {
  // timeStr: "08:43:02" (en-GB 24시간 형식, KST)
  try {
    const parts = timeStr.split(':');
    const kstH = parseInt(parts[0]);
    const kstM = parseInt(parts[1]);
    const preHourKST = isEDT() ? 17 : 18;
    const idx = (kstH * 60 + kstM) - (preHourKST * 60);
    return Math.max(0, Math.min(719, idx));
  } catch {
    return -1;
  }
}

function renderVCChart() {
  const wrap = document.getElementById('vc-scroll-wrap');
  const inner = document.getElementById('vc-chart-inner');
  if (!wrap || !inner) return;

  // canvas 복원
  if (!document.getElementById('vc-chart')) {
    inner.innerHTML = '<canvas id="vc-chart"></canvas>';
  }

  const baseW = wrap.clientWidth || 600;
  inner.style.width = Math.max(baseW, baseW * vcZoom) + 'px';

  // 720분 고정 시간축
  const timeLabels = buildTimeAxis();
  const totalSlots = 720;

  // 빈 배열로 초기화
  const vannaArr = new Array(totalSlots).fill(null);
  const charmArr = new Array(totalSlots).fill(null);
  const vixArr   = new Array(totalSlots).fill(null);
  const gexArr   = new Array(totalSlots).fill(null);

  // vcHistory → 시간축 인덱스에 매핑
  vcHistory.forEach(h => {
    const idx = getTimeIndex(h.time);
    if (idx >= 0 && idx < totalSlots) {
      vannaArr[idx] = h.vanna;
      charmArr[idx] = h.charm;
      vixArr[idx]   = h.vix;
      gexArr[idx]   = h.gex;
    }
  });

  if (vcChartInst) { vcChartInst.destroy(); vcChartInst = null; }

  // Y축 라벨: 1M, -1M 형식
  const mFormatter = v => {
    if (v == null) return '';
    const abs = Math.abs(v);
    const sign = v < 0 ? '-' : '';
    if (abs >= 1000) return sign + (abs/1000).toFixed(1) + 'B';
    return sign + abs + 'M';
  };

  // GEX 배경 플러그인 (각 시간 슬롯마다 세로로 색칠)
  const gexBgPlugin = {
    id: 'gexBackground',
    beforeDraw(chart) {
      const { ctx, chartArea, scales } = chart;
      if (!chartArea || !scales.x) return;
      const { top, bottom } = chartArea;
      const height = bottom - top;
      ctx.save();
      // 데이터가 있는 구간만 색칠
      let lastVal = null;
      for (let i = 0; i < totalSlots; i++) {
        const val = gexArr[i] !== null ? gexArr[i] : lastVal;
        if (val == null) continue;
        lastVal = val;
        const x0 = scales.x.getPixelForValue(i);
        const x1 = scales.x.getPixelForValue(i + 1);
        const w = Math.max(x1 - x0, 0.5);
        ctx.fillStyle = val >= 0
          ? 'rgba(63,185,80,0.10)'
          : 'rgba(248,81,73,0.10)';
        ctx.fillRect(x0, top, w, height);
      }
      ctx.restore();
    }
  };

  // 정규장 시작/마감 수직선 플러그인
  const sessionLinePlugin = {
    id: 'sessionLines',
    afterDraw(chart) {
      const { ctx, chartArea, scales } = chart;
      if (!chartArea || !scales.x) return;
      const preHourKST = isEDT() ? 17 : 18;
      // 정규장 시작: ET 9:30 = KST preHour+5:30
      const regularStartIdx = 5 * 60 + 30; // 330분
      // 마감: ET 16:00 = KST preHour+12:00
      const regularEndIdx = 12 * 60; // 720분 (마지막)

      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);

      [regularStartIdx].forEach(idx => {
        if (idx >= 0 && idx < totalSlots) {
          const x = scales.x.getPixelForValue(idx);
          ctx.beginPath();
          ctx.moveTo(x, chartArea.top);
          ctx.lineTo(x, chartArea.bottom);
          ctx.stroke();
          // 라벨
          ctx.fillStyle = 'rgba(255,255,255,0.4)';
          ctx.font = '10px monospace';
          ctx.fillText('개장', x + 3, chartArea.top + 12);
        }
      });
      ctx.restore();
    }
  };

  vcChartInst = new Chart(document.getElementById('vc-chart'), {
    type: 'line',
    data: {
      labels: timeLabels,
      datasets: [
        {
          label: 'Vanna (M)',
          data: vannaArr,
          borderColor: '#bc8cff',
          backgroundColor: 'transparent',
          fill: false,
          borderWidth: 2,
          pointRadius: 0,
          pointHoverRadius: 4,
          tension: 0.3,
          spanGaps: true,
          yAxisID: 'y',
        },
        {
          label: 'Charm (M)',
          data: charmArr,
          borderColor: '#58a6ff',
          backgroundColor: 'transparent',
          fill: false,
          borderWidth: 2,
          pointRadius: 0,
          pointHoverRadius: 4,
          tension: 0.3,
          spanGaps: true,
          yAxisID: 'y',
        },
        {
          label: 'VIX',
          data: vixArr,
          borderColor: '#d29922',
          backgroundColor: 'transparent',
          fill: false,
          borderWidth: 2,
          pointRadius: 0,
          pointHoverRadius: 4,
          tension: 0.3,
          spanGaps: true,
          yAxisID: 'yVix',
        },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#161b22', borderColor: '#30363d', borderWidth: 1,
          titleColor: '#e6edf3', bodyColor: '#8b949e', padding: 10,
          filter: item => item.parsed.y !== null,
          callbacks: {
            title: items => timeLabels[items[0].dataIndex] || '',
            label: item => {
              const ds = item.dataset.label;
              const v = item.parsed.y;
              if (v == null) return null;
              if (ds === 'VIX') return `VIX: ${v.toFixed(2)}`;
              return `${ds}: ${v.toFixed(1)}`;
            }
          }
        }
      },
      scales: {
        x: {
          ticks: {
            color: '#6e7681',
            font: { size: 10 },
            maxRotation: 0,
            autoSkip: false,
            callback: (val, idx) => timeLabels[idx] || '',
          },
          grid: { color: 'rgba(48,54,61,.4)' }
        },
        y: {
          position: 'left',
          ticks: { color: '#8b949e', font:{ size:10 }, callback: mFormatter },
          grid: { color:'rgba(48,54,61,.4)' },
        },
        yVix: {
          position: 'right',
          ticks: { color: '#d29922', font:{ size:10 }, callback: v => v?.toFixed(1) },
          grid: { drawOnChartArea: false },
        }
      }
    },
    plugins: [gexBgPlugin, sessionLinePlugin]
  });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 통합 상황판단 — 고정 섹션
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function buildFixedJudgment(d, vc) {
  const { spotPrice, flipZone, putWall, callWall, localGEX, totalGEX, upStrikes, dnStrikes } = d;
  const { totalVanna, totalCharm } = vc;
  const items = [];

  // GEX 구조
  const localM = localGEX / 1e6;
  if (totalGEX >= 0) {
    let pinRange = '';
    if (localM > 3000) pinRange = `예상 피닝 범위 $${(spotPrice*0.997).toFixed(0)} ~ $${(spotPrice*1.003).toFixed(0)} (±0.3%)`;
    else if (localM > 1000) pinRange = `예상 피닝 범위 $${(spotPrice*0.995).toFixed(0)} ~ $${(spotPrice*1.005).toFixed(0)} (±0.5%)`;
    else pinRange = `피닝 범위 넓음 (±1% 이상 가능)`;
    items.push({ cls:'ji-green', icon:'✚', text:`<b>Positive GEX +${localM.toFixed(0)}M</b> — 오늘 큰 방향성 움직임 어렵습니다. ${pinRange}` });
  } else {
    items.push({ cls:'ji-red', icon:'▼', text:`<b>Negative GEX ${localM.toFixed(0)}M</b> — 딜러가 추세를 증폭합니다. 방향 한 번 잡히면 가속 가능` });
  }

  // Vanna 구조
  if (Math.abs(totalVanna) > 100) {
    if (totalVanna < 0) {
      items.push({ cls:'ji-red', icon:'◈', text:`<b>Vanna ${totalVanna.toFixed(0)}M (음수)</b> — VIX 상승 시 딜러 매도 헷지 강화. VIX가 올라오면 하락 압력 가속됩니다` });
    } else {
      items.push({ cls:'ji-green', icon:'◈', text:`<b>Vanna ${totalVanna.toFixed(0)}M (양수)</b> — VIX 하락 시 딜러 매수 헷지. VIX가 내려오면 상승 지지력 강화됩니다` });
    }
  }

  // Charm 구조
  if (Math.abs(totalCharm) > 50) {
    if (totalCharm < 0) {
      items.push({ cls:'ji-blue', icon:'⏱', text:`<b>Charm ${totalCharm.toFixed(0)}M (음수)</b> — 시간 경과로 딜러 매수 강제. 오후 1시 이후 매수 드리프트 압력이 작동합니다` });
    } else {
      items.push({ cls:'ji-orange', icon:'⏱', text:`<b>Charm ${totalCharm.toFixed(0)}M (양수)</b> — 시간 경과로 딜러 매도 강제. 오후 1시 이후 하락 드리프트 압력이 작동합니다` });
    }
  }

  // Flip Zone
  if (flipZone) {
    const flipDist = Math.abs(spotPrice - flipZone) / spotPrice * 100;
    if (flipDist < 0.5) {
      items.push({ cls:'ji-red', icon:'⚡', text:`<b>Flip Zone $${flipZone} 극근접 (${flipDist.toFixed(2)}%)</b> — 이탈 시 딜러 방향 전환, 하락 가속 가능. 최우선 경계 레벨` });
    } else if (flipDist < 1.5) {
      items.push({ cls:'ji-yellow', icon:'⚠', text:`<b>Flip Zone $${flipZone} 근접 (${flipDist.toFixed(2)}%)</b> — 이탈 시 딜러 방향 전환. 하락 심화 가능` });
    } else {
      items.push({ cls:'ji-blue', icon:'○', text:`<b>Flip Zone $${flipZone}</b> — 현재가 대비 ${flipDist.toFixed(1)}% 하방. 당장 위협 아님` });
    }
  }

  // Put Wall / Call Wall
  if (putWall) {
    const putDist = (spotPrice - putWall) / spotPrice * 100;
    items.push({ cls:'ji-red', icon:'▼', text:`<b>Put Wall $${putWall}</b> — 하방 ${putDist.toFixed(1)}%. 대규모 풋 헷지 집중. 이탈 시 낙폭 가속` });
  }
  if (callWall) {
    const callDist = (callWall - spotPrice) / spotPrice * 100;
    items.push({ cls:'ji-green', icon:'▲', text:`<b>Call Wall $${callWall}</b> — 상방 ${callDist.toFixed(1)}%. 대규모 콜 헷지 집중. 상단 저항` });
  }

  return items;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 실시간 상황판단 이벤트 생성
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function buildLiveJudgment(newSpot, vc, d, ctx, timeStr) {
  const events = [];
  const { totalVanna, totalCharm } = vc;
  const { flipZone, totalGEX, spotPrice: baseSpot } = d;
  const { marketState, preMarketPct, prevClose, vix: currentVix } = ctx;

  const vixHistory = priceHistory.slice(-5).map(h=>h.vix).filter(Boolean);
  const vixChange = vixHistory.length >= 2
    ? (vixHistory[vixHistory.length-1] - vixHistory[0]) / vixHistory[0] * 100
    : 0;

  const now = new Date();
  const est = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
  const estHour = est.getHours() + est.getMinutes()/60;

  // 프리마켓 분석
  if (marketState === 'PRE' && prevClose && preMarketPct != null) {
    const abs = Math.abs(preMarketPct);
    if (abs > 0.5) {
      const dir = preMarketPct > 0 ? '상승' : '하락';
      const vannaDesc = totalVanna < 0
        ? `Vanna 음수 구조 — 개장 후 VIX ${preMarketPct>0?'하락':'상승'} 시 ${preMarketPct>0?'매도':'매수'} 압력 가능`
        : `Vanna 양수 구조 — 개장 후 VIX 흐름 주목`;
      events.push({ cls: preMarketPct>0?'le-warn':'le-info', msg:`프리마켓 ${dir} ${abs.toFixed(2)}% — 딜러 헷지 ${dir} 방향 진행 중. ${vannaDesc}` });
    }
  }

  // VIX 변화 감지
  if (Math.abs(vixChange) > 1.0 && totalVanna !== 0) {
    if (vixChange > 0 && totalVanna < 0) {
      events.push({ cls:'le-danger', msg:`VIX +${vixChange.toFixed(1)}% 상승 — Vanna 음수(${totalVanna.toFixed(0)}M) 활성화. 딜러 매도 압력 강화 중` });
    } else if (vixChange < 0 && totalVanna > 0) {
      events.push({ cls:'le-good', msg:`VIX ${vixChange.toFixed(1)}% 하락 — Vanna 양수(${totalVanna.toFixed(0)}M) 활성화. 딜러 매수 지지 강화 중` });
    } else if (vixChange < 0 && totalVanna < 0) {
      events.push({ cls:'le-info', msg:`VIX ${vixChange.toFixed(1)}% 하락 — Vanna 음수지만 VIX 하락으로 매도 압력 완화 중` });
    }
  }

  // Charm 타이밍
  if (estHour >= 13 && estHour < 13.1) {
    const charmMsg = totalCharm < 0 ? '매수 드리프트 시작' : '하락 드리프트 시작';
    events.push({ cls: totalCharm<0?'le-good':'le-warn', msg:`오후 1시 경과 — Charm(${totalCharm.toFixed(0)}M) ${charmMsg}. 시간 압력이 가격에 반영되기 시작합니다` });
  }

  if (estHour >= 15 && estHour < 15.1) {
    events.push({ cls:'le-warn', msg:`마감 1시간 전 — Charm 효과 최대화. 딜러 헷지 청산 물량 주의. 방향성 확대 가능` });
  }

  // Flip Zone 근접
  if (flipZone) {
    const dist = Math.abs(newSpot - flipZone) / newSpot * 100;
    if (dist < 0.3) {
      events.push({ cls:'le-danger', msg:`⚡ Flip Zone $${flipZone} 극근접 (${dist.toFixed(2)}%) — 이탈 시 딜러 방향 전환, 하락 가속 가능` });
    } else if (dist < 0.8) {
      events.push({ cls:'le-warn', msg:`Flip Zone $${flipZone} 근접 (${dist.toFixed(2)}%) — 이탈 여부 주목` });
    }
  }

  // GEX 상태
  if (totalGEX >= 0) {
    const localM = d.localGEX / 1e6;
    if (localM > 2000) {
      events.push({ cls:'le-info', msg:`Positive GEX 강함 (+${localM.toFixed(0)}M) — 현재 변동성 억제 중. 급등락 가능성 낮음` });
    }
  }

  // 기본 메시지
  if (!events.length) {
    events.push({ cls:'le-info', msg:`현재가 $${newSpot.toFixed(2)} — 주요 트리거 없음. 구조 유지 중` });
  }

  return events;
}

function renderJudgmentPanel(fixedItems, liveEvts, timeStr) {
  const fixedEl = document.getElementById('judgment-fixed-content');
  const liveEl = document.getElementById('judgment-live-content');
  if (!fixedEl || !liveEl) return;

  // 고정 섹션 (최초 1회만 렌더)
  if (fixedEl.dataset.rendered !== '1') {
    fixedEl.innerHTML = fixedItems.map(item => `
      <div class="judgment-item ${item.cls}">
        <span class="ji-icon">${item.icon}</span>
        <span class="ji-text">${item.text}</span>
      </div>
    `).join('');
    fixedEl.dataset.rendered = '1';
  }

  // 실시간 섹션 누적
  liveEvts.forEach(ev => {
    liveEvents.unshift({ time: timeStr, cls: ev.cls, msg: ev.msg });
  });
  if (liveEvents.length > 15) liveEvents = liveEvents.slice(0, 15);

  liveEl.innerHTML = liveEvents.map(e => `
    <div class="live-event ${e.cls}">
      <span class="le-time">${e.time}</span>
      <span class="le-msg">${e.msg}</span>
    </div>
  `).join('') || `<div class="live-event le-info"><span class="le-time">—</span><span class="le-msg">감지 중...</span></div>`;
}

function toggleAuto() {

    clearInterval(autoInterval);
    autoInterval = null;
    document.getElementById('auto-btn').className = 'auto-btn';
    document.getElementById('auto-label').textContent = '자동갱신 OFF';

async function autoRefresh() {
  if (!currentD) return;
  try {
    setStatus('updating');
    const sym = document.getElementById('sym-select').value.replace('_','');

    const [priceJson, vixJson] = await Promise.all([
      fetch(`${PROXY}/api/price?symbol=${sym==='SPX'?'SPY':sym}`).then(r=>r.json()),
      fetch(`${PROXY}/api/vix?symbols=VIX,VVIX`).then(r=>r.json()),
    ]);

    const newSpot = priceJson.price;
    const marketState = priceJson.marketState;
    const priceLabel = priceJson.priceLabel;
    const prevClose = priceJson.prevClose;
    const preMarketPct = priceJson.preMarketChangePercent;
    vixVal = vixJson.VIX?.price;
    vvixVal = vixJson.VVIX?.price;

    const now = new Date();
    const timeStr = now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit', timeZone:'Asia/Seoul'});

    priceHistory.push({ time:timeStr, price:newSpot, marketState, vix:vixVal, vvix:vvixVal, ts:now.getTime() });
    if (priceHistory.length > 60) priceHistory.shift();

    // Vanna/Charm 재계산
    const vc = calculateVannaCharm(currentD.strikes, newSpot, currentD.exp);

    // VannaCharm 히스토리 누적
    vcHistory.push({
      time: timeStr,
      vanna: parseFloat(vc.totalVanna.toFixed(2)),
      charm: parseFloat(vc.totalCharm.toFixed(2)),
      gex: parseFloat((currentD.localGEX/1e6).toFixed(2)),
      vix: vixVal,
      spot: newSpot
    });
    if (vcHistory.length > 120) vcHistory.shift();

    // UI 업데이트
    const stateLabel = { PRE:'프리마켓', REGULAR:'정규장', POST:'애프터', CLOSED:'마감' }[marketState] || marketState;
    document.getElementById('data-time').textContent = `${stateLabel} ${timeStr}`;
    updateVIXMetrics();
    updateSpotMetric(newSpot, marketState, preMarketPct, prevClose);

    // Vanna/Charm 메트릭 업데이트
    const mVanna = document.getElementById('metric-vanna');
    const mCharm = document.getElementById('metric-charm');
    if (mVanna) {
      mVanna.querySelector('.val').textContent = vc.totalVanna.toFixed(1)+'M';
      mVanna.style.borderColor = '#bc8cff55';
      mVanna.querySelector('.val').style.color = '#bc8cff';
    }
    if (mCharm) {
      mCharm.querySelector('.val').textContent = vc.totalCharm.toFixed(1)+'M';
      mCharm.style.borderColor = '#58a6ff55';
      mCharm.querySelector('.val').style.color = '#58a6ff';
    }

    // 힘의 균형 업데이트
    const force = calcForceBalance(vc, currentD, vixVal, vvixVal);
    renderForceSidebar(force);

    // 차트 업데이트
    renderVCChart();

    // 실시간 상황판단 업데이트
    const ctx = { marketState, priceLabel, preMarketPct, prevClose, vix: vixVal };
    const liveEvts = buildLiveJudgment(newSpot, vc, currentD, ctx, timeStr);
    const fixedItems = buildFixedJudgment(currentD, vc);
    renderJudgmentPanel(fixedItems, liveEvts, timeStr);

    prevSpot = newSpot;
    setStatus('live');
  } catch(e) { console.error(e); setStatus('error'); }
}

function updateSpotMetric(newSpot, marketState, preMarketPct, prevClose) {
  const m = document.getElementById('metric-spot'); if (!m) return;
  if (!currentD) return;
  const base = (marketState === 'PRE' && prevClose) ? prevClose : currentD.spotPrice;
  const pct = ((newSpot - base) / base * 100);

  let label = '$' + newSpot.toFixed(1);
  if (marketState === 'PRE') label = '[PRE] $' + newSpot.toFixed(1);
  else if (marketState === 'POST') label = '[POST] $' + newSpot.toFixed(1);

  m.querySelector('.val').textContent = label;
  m.querySelector('.lbl').textContent = `현재가 ${pct>=0?'+':''}${pct.toFixed(2)}%`;
  m.className = 'metric blue' + (marketState==='PRE'?' pre-market':marketState==='POST'?' post-market':'');
}

async function loadExpirations() {
  try {

    const r = await fetch(`${PROXY}/api/options?symbol=${sym}`);

    const exps = [...new Set(allOptions.map(o=>{
      const m=o.option.trim().match(/(\d{6})[CP]/); if(!m) return null;
      return `20${m[1].slice(0,2)}-${m[1].slice(2,4)}-${m[1].slice(4,6)}`;
    }).filter(Boolean))].filter(e=>e>=todayEST).sort();

async function loadData() {
  const sym = document.getElementById('sym-select').value;
  const exp = document.getElementById('exp-select').value;
  if (!exp) return;
  const btn = document.getElementById('load-btn');
  btn.disabled=true; btn.textContent='⏳ 로딩 중...';
  setStatus('loading');
  document.getElementById('main-area').innerHTML=`<div class="card"><div class="empty-state"><div class="spinner"></div><div class="empty-sub">CBOE 데이터 수신 중...</div></div></div>`;

  try {
    if (!allOptions.length) {
      const json = await fetch(`${PROXY}/api/options?symbol=${sym}`).then(r=>r.json());
      spotPrice=json.data.current_price; allOptions=json.data.options;
    }

    const expKey = exp.replace(/-/g,'').slice(2);

    // 원래 CBOE 최종 방식: 선택한 만기 하나만 파싱
    const parsed = allOptions.filter(o=>{
      const m=o.option.trim().match(/(\d{6})[CP]/); return m&&m[1]===expKey;
    }).map(o=>{
      const m=o.option.trim().match(/(\d{6})([CP])(\d+)/);
      return {strike:parseInt(m[3])/1000,type:m[2],iv:o.iv,gamma:o.gamma,delta:o.delta,oi:o.open_interest,volume:o.volume};
    });

    const map={};
    parsed.forEach(o=>{
      if(!map[o.strike])map[o.strike]={strike:o.strike,callOI:0,putOI:0,callGamma:0,putGamma:0,callVol:0,putVol:0,ivSum:0,ivN:0};
      const s=map[o.strike];
      if(o.type==='C'){s.callOI+=o.oi;s.callGamma=o.gamma;s.callVol+=o.volume;}
      else{s.putOI+=o.oi;s.putGamma=o.gamma;s.putVol+=o.volume;}
      if(o.iv>0){s.ivSum+=o.iv;s.ivN++;}
    });

    const strikes=Object.values(map).sort((a,b)=>a.strike-b.strike);
    strikes.forEach(s=>{
      const g=(s.callGamma+s.putGamma)/2;
      s.gex=(s.callOI-s.putOI)*100*g*spotPrice*spotPrice*0.01;
      s.iv=s.ivN>0?s.ivSum/s.ivN:0;
      s.callHedge=s.callGamma*s.callOI*100*spotPrice;
      s.putHedge=s.putGamma*s.putOI*100*spotPrice;
    });

    let cum=0,flipZone=null;
    strikes.forEach(s=>{const p=cum;cum+=s.gex;s.cumGex=cum;if(!flipZone&&((p<0&&cum>=0)||(p>0&&cum<=0)))flipZone=s.strike;});

    const near=strikes.filter(s=>Math.abs(s.strike-spotPrice)/spotPrice<0.10);
    const putWall=near.reduce((b,s)=>s.putOI>b.putOI?s:b,near[0])?.strike;
    const callWall=near.reduce((b,s)=>s.callOI>b.callOI?s:b,near[0])?.strike;
    const localGEX=strikes.filter(s=>Math.abs(s.strike-spotPrice)/spotPrice<0.02).reduce((a,s)=>a+s.gex,0);
    const totalCallOI=strikes.reduce((a,s)=>a+s.callOI,0);
    const totalPutOI=strikes.reduce((a,s)=>a+s.putOI,0);
    const pcr=totalPutOI/Math.max(totalCallOI,1);
    const totalGEX=cum;
    const upStrikes=strikes.filter(s=>s.strike>spotPrice&&s.strike<=spotPrice*1.05).sort((a,b)=>b.callHedge-a.callHedge).slice(0,4);
    const dnStrikes=strikes.filter(s=>s.strike<spotPrice&&s.strike>=spotPrice*0.95).sort((a,b)=>b.putHedge-a.putHedge).slice(0,4);

    currentStrikes=strikes; priceHistory=[]; liveEvents=[]; vcHistory=[];
    prevSpot=spotPrice;
    const d={strikes,spotPrice,flipZone,putWall,callWall,localGEX,totalGEX,pcr,exp,sym,upStrikes,dnStrikes};
    currentD=d;
    render(d);

    if (!autoInterval) {
      document.getElementById('auto-btn').className = 'auto-btn on';
      document.getElementById('auto-label').textContent = '자동갱신 ON';
      autoRefresh();
      autoInterval = setInterval(autoRefresh, 60000);
    }
    setStatus('live');
  } catch(e){
    console.error(e); setStatus('error');
    document.getElementById('main-area').innerHTML=`<div class="card"><div class="empty-state"><div class="empty-title">로드 실패</div><div class="empty-sub">${e.message}</div></div></div>`;
  } finally{btn.disabled=false;btn.textContent='⬇ 데이터 로드';}
}

function setStatus(s){
  const dot=document.getElementById('status-dot'),txt=document.getElementById('status-text');
  if(s==='loading'){dot.className='status-dot';txt.textContent='로딩 중...';}
  else if(s==='live'){dot.className='status-dot live';txt.textContent='로드 완료';}
  else if(s==='updating'){dot.className='status-dot updating';txt.textContent='갱신 중...';}
  else{dot.className='status-dot';txt.textContent='오류';}
}

function render(d){
  const{strikes,spotPrice,flipZone,putWall,callWall,localGEX,totalGEX,pcr,exp,sym,upStrikes,dnStrikes}=d;
  const regime=totalGEX>=0?'positive':'negative';
  const vc = calculateVannaCharm(strikes, spotPrice, exp);

  const alarms=[];
  const flipDist=flipZone?Math.abs(spotPrice-flipZone)/spotPrice*100:null;
  const putDist=putWall?(spotPrice-putWall)/spotPrice*100:null;
  if(!flipZone) alarms.push({l:'red',m:`GEX 전 구간 ${regime==='negative'?'음수':'양수'} — Flip Zone 없음`});
  else if(flipDist<0.5) alarms.push({l:'red',m:`Flip Zone ($${flipZone}) 극근접 ${flipDist.toFixed(2)}% — 방향 전환 임박`});
  else if(flipDist<1.5) alarms.push({l:'yellow',m:`Flip Zone ($${flipZone}) 근접 ${flipDist.toFixed(2)}%`});
  if(putDist!==null&&putDist<1) alarms.push({l:'red',m:`Put Wall ($${putWall}) 직하방 — 이탈 시 낙폭 가속`});
  alarms.push(localGEX<0?{l:'red',m:`로컬 GEX ${(localGEX/1e6).toFixed(1)}M — 딜러 추세 증폭`}:{l:'green',m:`로컬 GEX +${(localGEX/1e6).toFixed(1)}M — 딜러 변동성 억제`});
  if(pcr>1.5) alarms.push({l:'red',m:`PCR ${pcr.toFixed(2)} — 풋 편중 심화`});
  else if(pcr<0.7) alarms.push({l:'yellow',m:`PCR ${pcr.toFixed(2)} — 콜 편중`});

  const maxUp=Math.max(...upStrikes.map(s=>s.callHedge),1);
  const maxDn=Math.max(...dnStrikes.map(s=>s.putHedge),1);
  const rankCls=i=>['r1','r2','r3','r4'][i]||'r4';
  const upRows=upStrikes.map((s,i)=>{
    const dist=((s.strike-spotPrice)/spotPrice*100).toFixed(2);
    const pct=Math.round(s.callHedge/maxUp*100);
    return `<div class="hedge-row"><span class="hedge-rank ${rankCls(i)}">${i+1}</span><span class="hedge-strike">$${s.strike}</span><span class="hedge-dist">+${dist}%</span><div class="hedge-bar-wrap"><div class="hedge-bar up" style="width:${pct}%"></div></div><span class="hedge-pressure">${(s.callHedge/1e6).toFixed(1)}M</span></div>`;
  }).join('');
  const dnRows=dnStrikes.map((s,i)=>{
    const dist=((spotPrice-s.strike)/spotPrice*100).toFixed(2);
    const pct=Math.round(s.putHedge/maxDn*100);
    return `<div class="hedge-row"><span class="hedge-rank ${rankCls(i)}">${i+1}</span><span class="hedge-strike">$${s.strike}</span><span class="hedge-dist">-${dist}%</span><div class="hedge-bar-wrap"><div class="hedge-bar dn" style="width:${pct}%"></div></div><span class="hedge-pressure">${(s.putHedge/1e6).toFixed(1)}M</span></div>`;
  }).join('');

  const chartData=strikes.filter(s=>Math.abs(s.strike-spotPrice)/spotPrice<0.08);
  const tableData=strikes.filter(s=>Math.abs(s.strike-spotPrice)/spotPrice<0.10);
  const vixDisplay = vixVal ? vixVal.toFixed(2) : '—';
  const vvixDisplay = vvixVal ? vvixVal.toFixed(2) : '—';
  const vixCls = vixVal ? (vixVal>30?'danger':vixVal>20?'warn':'') : '';
  const vvixCls = vvixVal ? (vvixVal>130?'danger':vvixVal>110?'warn':'') : '';

  const fixedItems = buildFixedJudgment(d, vc);

  document.getElementById('main-area').innerHTML=`
  <div class="card">
    <div class="card-title">${sym} · 만기 ${exp} · 종가 기준 $${spotPrice.toFixed(2)}</div>
    <div class="regime-bar ${regime}">${regime==='positive'?'✚ Positive GEX — 딜러 변동성 억제 (피닝)':'▼ Negative GEX — 딜러 추세 증폭'}</div>
    <div id="alarm-list"></div>
    <div class="metrics">
      <div class="metric blue" id="metric-spot"><div class="val">$${spotPrice.toFixed(1)}</div><div class="lbl">현재가</div></div>
      <div class="metric ${flipZone?'orange':''}"><div class="val">${flipZone?'$'+flipZone:'없음'}</div><div class="lbl">Flip Zone</div></div>
      <div class="metric ${pcr>1.5?'red':pcr<0.7?'yellow':''}"><div class="val">${pcr.toFixed(2)}</div><div class="lbl">Put/Call</div></div>
      <div class="metric red"><div class="val">${putWall?'$'+putWall:'—'}</div><div class="lbl">Put Wall</div></div>
      <div class="metric green"><div class="val">${callWall?'$'+callWall:'—'}</div><div class="lbl">Call Wall</div></div>
      <div class="metric ${localGEX<0?'red':'green'}"><div class="val">${(localGEX/1e6).toFixed(1)}M</div><div class="lbl">Local GEX</div></div>
      <div class="metric ${vixCls}" id="metric-vix"><div class="val">${vixDisplay}</div><div class="lbl">VIX</div></div>
      <div class="metric ${vvixCls}" id="metric-vvix"><div class="val">${vvixDisplay}</div><div class="lbl">VVIX</div></div>
      <div class="metric" id="metric-vanna" style="border-color:#bc8cff55"><div class="val" style="color:#bc8cff">${vc.totalVanna.toFixed(1)}M</div><div class="lbl" style="color:#bc8cff">● Vanna Exp</div></div>
      <div class="metric" id="metric-charm" style="border-color:#58a6ff55"><div class="val" style="color:#58a6ff">${vc.totalCharm.toFixed(1)}M</div><div class="lbl" style="color:#58a6ff">● Charm Exp</div></div>
    </div>

    <!-- 통합 상황판단 -->
    <div class="judgment-panel" style="margin-top:20px">
      <div class="judgment-fixed">
        <div class="judgment-fixed-title">시장 구조 분석 — 오늘의 핵심 구조</div>
        <div id="judgment-fixed-content"></div>
      </div>
      <div class="judgment-live">
        <div class="judgment-live-title"><div class="live-dot"></div>실시간 상황 판단</div>
        <div id="judgment-live-content"><div class="live-event le-info"><span class="le-time">—</span><span class="le-msg">자동갱신 ON 후 활성화됩니다</span></div></div>
      </div>
    </div>

    <div class="hedge-section">
      <div class="hedge-title">딜러 헷지 부담 집중 스트라이크 (γ × OI 기준)</div>
      <div class="hedge-grid">
        <div><div class="hedge-col-label" style="color:var(--green)">▲ 상승 — 콜 헷지 Top4</div>${upRows||'<div style="color:var(--text3);font-size:13px;padding:8px">데이터 없음</div>'}</div>
        <div><div class="hedge-col-label" style="color:var(--red)">▼ 하락 — 풋 헷지 Top4</div>${dnRows||'<div style="color:var(--text3);font-size:13px;padding:8px">데이터 없음</div>'}</div>
      </div>
    </div>
  </div>

  <!-- Greek 힘의 균형 메트릭 카드 + VannaCharm 차트 -->
  <div class="vc-panel-wrap" style="flex-direction:column">
    <!-- Greek 메트릭 카드 행 -->
    <div id="greek-metrics-row" style="display:flex;gap:10px;flex-wrap:wrap;padding:14px 20px 0;border-bottom:1px solid var(--border)">
      <div class="greek-metric-card" id="gmc-vanna">
        <div class="gmc-header">
          <span class="gmc-dot" style="background:#bc8cff"></span>
          <span class="gmc-name">Vanna</span>
          <span class="gmc-signal" id="gmc-vanna-signal">—</span>
        </div>
        <div class="gmc-value" id="gmc-vanna-val">—</div>
        <div class="gmc-desc" id="gmc-vanna-desc">자동갱신 후 표시</div>
      </div>
      <div class="greek-metric-card" id="gmc-charm">
        <div class="gmc-header">
          <span class="gmc-dot" style="background:#58a6ff"></span>
          <span class="gmc-name">Charm</span>
          <span class="gmc-signal" id="gmc-charm-signal">—</span>
        </div>
        <div class="gmc-value" id="gmc-charm-val">—</div>
        <div class="gmc-desc" id="gmc-charm-desc">자동갱신 후 표시</div>
      </div>
      <div class="greek-metric-card" id="gmc-gex">
        <div class="gmc-header">
          <span class="gmc-dot" style="background:#3fb950"></span>
          <span class="gmc-name">GEX</span>
          <span class="gmc-signal" id="gmc-gex-signal">—</span>
        </div>
        <div class="gmc-value" id="gmc-gex-val">—</div>
        <div class="gmc-desc" id="gmc-gex-desc">자동갱신 후 표시</div>
      </div>
      <div class="greek-metric-card" style="flex:1;min-width:160px" id="gmc-dominant">
        <div class="gmc-header">
          <span class="gmc-name" style="color:var(--text2)">◈ 지배 Greek</span>
        </div>
        <div class="gmc-value" id="gmc-dominant-val" style="font-size:13px">—</div>
        <div class="gmc-desc" id="gmc-flip-desc">—</div>
      </div>
    </div>
    <!-- VannaCharm 차트 (전체 너비) -->
    <div class="vc-chart-area" style="width:100%;border-right:none">
      <div class="vc-chart-header">
        <div class="vc-chart-title">◈ Greek 실시간 흐름 (CBOE 기반)</div>
        <div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap">
          <span style="font-size:12px;color:#bc8cff;font-weight:600">● Vanna</span>
          <span style="font-size:12px;color:#58a6ff;font-weight:600">● Charm</span>
          <span style="font-size:12px;color:#d29922;font-weight:600">— VIX</span>
          <span style="font-size:12px;color:#3fb950;font-weight:600">▪ GEX 배경</span>
        </div>
      </div>
      <div class="vc-zoom-row">
        <span class="vc-zoom-label">확대</span>
        <input type="range" class="vc-zoom-slider" min="1" max="6" step="0.5" value="1" oninput="updateVCZoom(this.value)">
        <span class="vc-zoom-val" id="vc-zoom-val">1×</span>
        <span style="font-size:11px;color:var(--text3)">← 스크롤 →</span>
      </div>
      <div class="vc-scroll-wrap" id="vc-scroll-wrap">
        <div class="vc-chart-inner" id="vc-chart-inner">
          <canvas id="vc-chart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">OI 분포 + GEX</div>
    <div class="chart-controls">
      <span class="zoom-label">확대</span>
      <input type="range" class="zoom-slider" id="zoom-slider" min="1" max="6" step="0.5" value="1" oninput="updateZoom(this.value)">
      <span class="zoom-val" id="zoom-val">1×</span>
      <span class="scroll-hint">← 가로 스크롤 →</span>
    </div>
    <div class="chart-scroll-wrap" id="chart-scroll-wrap">
      <div class="chart-inner" id="chart-inner"><canvas id="mainchart"></canvas></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">스트라이크별 상세 — 현재가 ±10%</div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Strike</th><th>Call OI</th><th>Put OI</th><th>GEX(M)</th><th>Call Vol</th><th>Put Vol</th><th>IV</th></tr></thead>
      <tbody id="tbl-body"></tbody>
    </table></div>
  </div>`;

  // 알람
  const al=document.getElementById('alarm-list');
  (alarms.length?alarms:[{l:'green',m:'특이 리스크 없음'}]).forEach(a=>{
    const div=document.createElement('div'); div.className=`alarm ${a.l}`; div.textContent=a.m; al.appendChild(div);
  });

  // 고정 섹션 초기 렌더
  const fixedEl = document.getElementById('judgment-fixed-content');
  if (fixedEl) {
    fixedEl.innerHTML = fixedItems.map(item=>`
      <div class="judgment-item ${item.cls}">
        <span class="ji-icon">${item.icon}</span>
        <span class="ji-text">${item.text}</span>
      </div>`).join('');
    fixedEl.dataset.rendered = '1';
  }

  // 차트
  buildChart(chartData, spotPrice, flipZone, putWall, callWall);

  // 테이블
  const tbody=document.getElementById('tbl-body');
  tableData.forEach(s=>{
    const isCur=Math.abs(s.strike-spotPrice)<0.5;
    const isFlip=s.strike===flipZone,isPW=s.strike===putWall,isCW=s.strike===callWall;
    const tr=document.createElement('tr');
    if(isCur)tr.className='cur'; else if(isFlip)tr.className='flip';
    let tags='';
    if(isCur)tags+=`<span class="tag tag-cur">현재가</span>`;
    if(isFlip)tags+=`<span class="tag tag-flip">Flip</span>`;
    if(isPW)tags+=`<span class="tag tag-pw">Put Wall</span>`;
    if(isCW)tags+=`<span class="tag tag-cw">Call Wall</span>`;
    const gc=s.gex>=0?'#3fb950':'#f85149';
    tr.innerHTML=`<td>$${s.strike}${tags}</td><td>${s.callOI.toLocaleString()}</td><td>${s.putOI.toLocaleString()}</td><td style="color:${gc};font-weight:600">${s.gex>=0?'+':''}${(s.gex/1e6).toFixed(2)}</td><td>${s.callVol.toLocaleString()}</td><td>${s.putVol.toLocaleString()}</td><td>${s.iv>0?(s.iv*100).toFixed(1)+'%':'—'}</td>`;
    tbody.appendChild(tr);
  });

  // VannaCharm 차트 초기 렌더
  renderVCChart();
}

function updateVCZoom(val) {
  vcZoom = parseFloat(val);
  document.getElementById('vc-zoom-val').textContent = val + '×';
  renderVCChart();
}

function buildChart(chartData, sp, flipZone, putWall, callWall) {
  if (chartInst){chartInst.destroy();chartInst=null;}
  const wrap=document.getElementById('chart-scroll-wrap');
  const inner=document.getElementById('chart-inner');
  const baseW=wrap.clientWidth||window.innerWidth-56;
  inner.style.width=Math.max(baseW, baseW*zoomLevel)+'px';

  chartInst=new Chart(document.getElementById('mainchart'),{
    data:{
      labels:chartData.map(s=>s.strike%5===0?'$'+s.strike:''),
      datasets:[
        {type:'bar',label:'Call OI',data:chartData.map(s=>s.callOI),backgroundColor:'rgba(88,166,255,.4)',yAxisID:'y'},
        {type:'bar',label:'Put OI',data:chartData.map(s=>-s.putOI),backgroundColor:'rgba(248,81,73,.4)',yAxisID:'y'},
        {type:'line',label:'GEX(M)',data:chartData.map(s=>+(s.gex/1e6).toFixed(3)),
         borderColor:'#f0883e',backgroundColor:'transparent',
         pointRadius:3,pointBackgroundColor:'#f0883e',
         borderWidth:2.5,tension:.3,yAxisID:'y2'},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:true,position:'top',align:'start',labels:{color:'#8b949e',font:{size:12},boxWidth:12,padding:16}},
        tooltip:{
          backgroundColor:'#161b22',borderColor:'#30363d',borderWidth:1,
          titleColor:'#e6edf3',bodyColor:'#8b949e',padding:12,
          callbacks:{
            title:items=>'$'+chartData[items[0].dataIndex]?.strike,
            afterBody:items=>{
              const s=chartData[items[0].dataIndex]; if(!s) return [];
              const lines=[];
              if(s.iv>0) lines.push(`IV: ${(s.iv*100).toFixed(1)}%`);
              if(s.strike===flipZone) lines.push('⚡ Flip Zone');
              if(s.strike===putWall) lines.push('🔴 Put Wall');
              if(s.strike===callWall) lines.push('🟢 Call Wall');
              return lines;
            }
          }
        },
      },
      scales:{
        x:{ticks:{color:'#6e7681',font:{size:11},autoSkip:false,maxRotation:45},grid:{color:'rgba(48,54,61,.7)'}},
        y:{
          position:'left',
          ticks:{
            color:'#6e7681',font:{size:11},
            callback: v => {
              const abs = Math.abs(v);
              const sign = v < 0 ? '-' : '';
              if (abs >= 1000000) return sign + Math.round(abs/1000000) + 'M';
              if (abs >= 1000) return sign + Math.round(abs/1000) + 'K';
              return v;
            }
          },
          grid:{color:'rgba(48,54,61,.7)'}
        },
        y2:{
          position:'right',
          ticks:{
            color:'#f0883e',font:{size:11},
            callback: v => {
              const abs = Math.abs(v);
              const sign = v < 0 ? '-' : '';
              if (abs >= 1000) return sign + Math.round(abs/1000) + 'K';
              return v + 'M';
            }
          },
          grid:{
            drawOnChartArea:true,
            color: ctx => ctx.tick.value === 0 ? 'rgba(255,255,255,0.25)' : 'transparent',
            lineWidth: ctx => ctx.tick.value === 0 ? 1 : 0,
          }
        },
      }
    }
  });
}

function updateZoom(val){
  zoomLevel=parseFloat(val);
  document.getElementById('zoom-val').textContent=val+'×';
  if(!currentD) return;
  const chartData=currentStrikes.filter(s=>Math.abs(s.strike-currentD.spotPrice)/currentD.spotPrice<0.08);
  buildChart(chartData,currentD.spotPrice,currentD.flipZone,currentD.putWall,currentD.callWall);
}
</script>
</body>
</html>
